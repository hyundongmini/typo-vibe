<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 06 vol.2 - 자신을 믿고 자랑스럽게 여겨라</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#e8ddc4;
  font-family:'Pretendard',-apple-system,sans-serif;
  position:relative;user-select:none;
  /* old paper / print stain texture */
  background-image:
    radial-gradient(ellipse at 20% 30%, rgba(180,140,90,0.22) 0%, transparent 40%),
    radial-gradient(ellipse at 80% 70%, rgba(150,110,70,0.18) 0%, transparent 45%),
    radial-gradient(circle at 50% 10%, rgba(100,70,40,0.15) 0%, transparent 30%),
    linear-gradient(180deg,#eadcc0 0%,#d9c8a6 100%);
}

/* paper grain */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    repeating-linear-gradient(0deg,
      rgba(0,0,0,0.015) 0px,
      rgba(0,0,0,0.015) 1px,
      transparent 1px,
      transparent 3px),
    repeating-linear-gradient(90deg,
      rgba(0,0,0,0.01) 0px,
      rgba(0,0,0,0.01) 1px,
      transparent 1px,
      transparent 2px);
  opacity:0.5;
}

/* paper stains and specks */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:2;
  background-image:
    radial-gradient(circle at 15% 85%, rgba(120,80,40,0.3) 0%, transparent 2%),
    radial-gradient(circle at 72% 18%, rgba(140,90,50,0.25) 0%, transparent 1.5%),
    radial-gradient(circle at 92% 60%, rgba(160,110,60,0.2) 0%, transparent 2.5%),
    radial-gradient(circle at 8% 45%, rgba(100,70,30,0.15) 0%, transparent 1.2%);
}

.poster{
  position:relative;z-index:3;width:100%;height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:6vh 20px 20px;
  transform:rotate(-0.6deg);
}

/* Top label — matches original image */
.label-banner{
  background:#f0e4c9;
  border-top:4px double #2d3f6b;
  border-bottom:4px double #2d3f6b;
  padding:18px 60px 14px;
  margin-bottom:3.5vh;
  transform:rotate(0.3deg);
  box-shadow:2px 4px 0 rgba(80,50,20,0.1);
  position:relative;
}
.label-banner::before,.label-banner::after{
  content:'';position:absolute;left:50%;transform:translateX(-50%);
  width:60%;height:2px;background:#2d3f6b;
}
.label-banner::before{top:8px}
.label-banner::after{bottom:8px}

.label-banner h1{
  font-family:'Pretendard',sans-serif;
  font-weight:900;
  font-size:clamp(22px,3.2vw,38px);
  color:#2d3f6b;
  letter-spacing:-0.02em;
  line-height:1.3;
  text-align:center;
  text-shadow:1px 1px 0 rgba(45,63,107,0.15);
}

/* Scene area */
.scene{
  position:relative;
  width:min(540px,85vw);
  height:min(560px,62vh);
  background:linear-gradient(180deg,#faf4e6 0%,#eaddbd 100%);
  box-shadow:
    inset 0 0 80px rgba(140,100,60,0.15),
    3px 6px 0 rgba(80,50,20,0.12);
  border:1px solid rgba(100,70,40,0.2);
  display:flex;align-items:flex-end;justify-content:center;
  overflow:hidden;
}

/* scene vignette */
.scene::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse at center,transparent 40%,rgba(90,60,30,0.25) 100%);
}

/* Floor shadow */
.floor{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);
  width:70%;height:20px;
  background:radial-gradient(ellipse,rgba(60,40,20,0.25) 0%,transparent 70%);
  filter:blur(8px);
}

/* Cat (back view) — user uploaded image */
.cat-wrap{
  position:absolute;bottom:60px;left:18%;
  width:36%;aspect-ratio:1/1.2;
  z-index:5;
  transition:opacity 0.4s ease;
  display:flex;align-items:center;justify-content:center;
}
.cat-img{
  width:100%;height:100%;
  object-fit:cover;
  /* oval mask to fit back-view silhouette feel */
  -webkit-mask:radial-gradient(ellipse 45% 50% at 50% 48%,black 70%,transparent 95%);
  mask:radial-gradient(ellipse 45% 50% at 50% 48%,black 70%,transparent 95%);
  filter:sepia(0.25) saturate(1.05) contrast(1.05) drop-shadow(0 6px 10px rgba(60,40,20,0.3));
}

/* placeholder when no upload */
.cat-placeholder{
  width:72%;height:82%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2.5px dashed rgba(45,63,107,0.4);
  border-radius:50% / 55%;
  color:#2d3f6b;opacity:0.7;
  padding:20px;text-align:center;
  cursor:pointer;
  transition:all 0.25s ease;
  background:rgba(255,255,255,0.3);
}
.cat-placeholder:hover{
  border-color:#2d3f6b;opacity:1;
  background:rgba(255,255,255,0.6);
  transform:scale(1.03);
}
.cat-placeholder.drag{
  border-color:#2d3f6b;opacity:1;
  background:rgba(200,220,255,0.6);
  transform:scale(1.05);
}
.cat-placeholder svg{width:38px;height:38px;stroke:#2d3f6b;fill:none;stroke-width:2;margin-bottom:8px}
.cat-placeholder .ph-title{font-family:'Pretendard',sans-serif;font-size:13px;font-weight:700;letter-spacing:-0.02em;margin-bottom:4px}
.cat-placeholder .ph-hint{font-size:10px;letter-spacing:1px;opacity:0.7}

/* Mirror */
.mirror{
  position:absolute;bottom:55px;right:8%;
  width:42%;height:68%;
  z-index:6;
}

.mirror-frame{
  position:absolute;inset:0;
  background:
    linear-gradient(135deg,#3a1f0a 0%,#6b3920 40%,#8b5430 60%,#4a2810 100%);
  border-radius:50% 50% 48% 48% / 55% 55% 45% 45%;
  box-shadow:
    inset 0 0 30px rgba(0,0,0,0.5),
    inset 0 5px 15px rgba(255,200,150,0.15),
    5px 10px 20px rgba(60,30,10,0.4),
    0 15px 25px rgba(60,30,10,0.3);
}
.mirror-frame::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:
    repeating-linear-gradient(45deg,
      transparent 0px,transparent 3px,
      rgba(0,0,0,0.08) 3px,rgba(0,0,0,0.08) 4px);
}

/* Mirror stand */
.mirror-stand{
  position:absolute;left:50%;bottom:-50px;transform:translateX(-50%);
  width:55%;height:55px;z-index:0;
}
.mirror-stand::before{
  content:'';position:absolute;left:50%;top:0;transform:translateX(-50%);
  width:12px;height:30px;
  background:linear-gradient(90deg,#3a1f0a,#6b3920,#3a1f0a);
}
.mirror-stand::after{
  content:'';position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:80%;height:12px;
  background:linear-gradient(180deg,#6b3920,#3a1f0a);
  border-radius:4px;
  box-shadow:0 3px 8px rgba(60,30,10,0.4);
}

/* Mirror inner (the "beast reveal" area) */
.mirror-inner{
  position:absolute;inset:5%;
  border-radius:50% 50% 48% 48% / 55% 55% 45% 45%;
  overflow:hidden;
  background:linear-gradient(160deg,#1a1a2e 0%,#2d1810 60%,#0f0a05 100%);
  box-shadow:inset 0 0 40px rgba(0,0,0,0.8);
}

/* Mirror glass shine */
.mirror-inner::before{
  content:'';position:absolute;top:10%;left:15%;width:25%;height:40%;
  background:linear-gradient(135deg,rgba(255,255,255,0.12) 0%,transparent 60%);
  border-radius:50%;filter:blur(4px);pointer-events:none;z-index:10;
}

/* Beast visual inside mirror */
.beast{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  opacity:1;
  transition:opacity 0.6s ease;
}
.beast.show{opacity:1}
.beast svg{width:100%;height:100%}
.beast img.beast-photo{
  width:100%;height:100%;object-fit:cover;
  filter:saturate(1.15) contrast(1.1);
}

/* Idle state — three dots waiting */
.mirror-idle{
  display:flex;gap:10px;align-items:center;
  opacity:0.5;
}
.beast.show .mirror-idle{display:none}
.idle-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,220,180,0.6);
  animation:pulse 1.4s ease-in-out infinite;
}
.idle-dot:nth-child(2){animation-delay:0.2s}
.idle-dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,100%{opacity:0.3;transform:scale(0.8)}50%{opacity:1;transform:scale(1.2)}}

/* Lightning flash overlay */
.flash{
  position:absolute;inset:0;pointer-events:none;
  background:#fff;opacity:0;z-index:20;mix-blend-mode:screen;
}
.flash.on{animation:lightning 0.6s ease}
@keyframes lightning{
  0%{opacity:0}
  10%{opacity:1}
  20%{opacity:0.3}
  30%{opacity:1}
  50%{opacity:0.1}
  70%{opacity:0.6}
  100%{opacity:0}
}

/* Power rays from mirror */
.rays{
  position:absolute;inset:-50%;pointer-events:none;z-index:3;
  opacity:0;transition:opacity 0.6s ease;
}
.rays.show{opacity:0.6;animation:rayRotate 8s linear infinite}
@keyframes rayRotate{to{transform:rotate(360deg)}}
.rays svg{width:100%;height:100%}

/* Glitch lines on mirror during transition */
.glitch{
  position:absolute;inset:0;pointer-events:none;z-index:15;
  opacity:0;
}
.glitch.on{animation:glitchAnim 0.5s steps(5) 2}
@keyframes glitchAnim{
  0%{opacity:0;transform:translateX(0)}
  20%{opacity:0.8;transform:translateX(-4px)}
  40%{opacity:0.6;transform:translateX(3px)}
  60%{opacity:0.9;transform:translateX(-2px)}
  80%{opacity:0.4;transform:translateX(5px)}
  100%{opacity:0;transform:translateX(0)}
}
.glitch::before,.glitch::after{
  content:'';position:absolute;left:0;right:0;height:2px;
  background:rgba(255,100,100,0.8);
}
.glitch::before{top:30%;box-shadow:0 80px 0 rgba(100,200,255,0.6),0 -40px 0 rgba(255,255,100,0.5)}
.glitch::after{top:60%;box-shadow:0 30px 0 rgba(255,100,200,0.6),0 -20px 0 rgba(100,255,100,0.5)}

/* Reset button */
.reset-btn{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:10;
  padding:10px 22px;
  background:#2d3f6b;color:#fff;
  border:2px solid #2d3f6b;
  font-family:'Pretendard',sans-serif;font-size:12px;font-weight:700;
  letter-spacing:2px;cursor:pointer;
  box-shadow:3px 4px 0 rgba(80,50,20,0.2);
  transition:all 0.2s ease;
}
.reset-btn:hover{
  background:#fff;color:#2d3f6b;
  transform:translateX(-50%) translateY(-2px);
  box-shadow:3px 6px 0 rgba(80,50,20,0.3);
}

/* Caption under scene */
.caption{
  margin-top:14px;
  font-family:'Pretendard',sans-serif;
  font-size:12px;color:#2d3f6b;
  opacity:0.6;letter-spacing:2px;
  text-transform:uppercase;
  text-align:center;
}
.caption .name{font-weight:700;font-size:14px;letter-spacing:1px;text-transform:none}
.caption .arrow{margin:0 10px;opacity:0.5}

/* Day indicator */
.day-tag{
  position:fixed;bottom:14px;right:18px;z-index:100;
  font:11px/1 monospace;
  color:rgba(45,63,107,0.5);
  letter-spacing:1px;
  pointer-events:none;
}

/* Hint */
.hint{
  position:fixed;top:14px;right:18px;z-index:100;
  font:10px/1.4 monospace;
  color:rgba(45,63,107,0.45);
  letter-spacing:2px;
  text-align:right;
  pointer-events:none;
}

/* Tape corners for poster feel */
.tape{
  position:absolute;width:70px;height:22px;
  background:rgba(240,220,170,0.6);
  border:1px solid rgba(160,130,90,0.3);
  z-index:20;
  pointer-events:none;
}
.tape.tl{top:-10px;left:-10px;transform:rotate(-35deg)}
.tape.tr{top:-10px;right:-10px;transform:rotate(35deg)}

@media(max-width:600px){
  .label-banner{padding:14px 30px 10px}
  .scene{height:56vh}
  .cat-wrap{bottom:40px}
  .mirror{bottom:35px}
  .reset-btn{bottom:12px;padding:8px 18px;font-size:11px}
}
</style>
</head>
<body>

<div class="poster">
  <div class="label-banner">
    <span class="tape tl"></span>
    <span class="tape tr"></span>
    <h1>자신을 믿고 자랑스럽게<br>여겨라</h1>
  </div>

  <div class="scene" id="scene">
    <div class="floor"></div>

    <!-- Cat (back view, user uploaded image) -->
    <div class="cat-wrap" id="catWrap">
      <label class="cat-placeholder" id="placeholder" for="fileInput">
        <svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        <div class="ph-title">사진을 올려보세요</div>
        <div class="ph-hint">고양이 · 강아지 · 사람</div>
      </label>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <img class="cat-img" id="catImg" style="display:none" alt="">
    </div>

    <!-- Mirror -->
    <div class="mirror">
      <div class="mirror-stand"></div>
      <div class="mirror-frame"></div>
      <div class="mirror-inner">
        <div class="rays" id="rays"></div>
        <div class="beast" id="beast">
          <div class="mirror-idle">
            <div class="idle-dot"></div>
            <div class="idle-dot"></div>
            <div class="idle-dot"></div>
          </div>
        </div>
        <div class="glitch" id="glitch"></div>
      </div>
    </div>

    <div class="flash" id="flash"></div>

    <!-- Reset button -->
    <button class="reset-btn" id="resetBtn" style="display:none">다시 올리기</button>
  </div>

  <div class="caption">
    <span class="name" id="catName">당신</span>
    <span class="arrow">→</span>
    <span class="name" id="beastName">?</span>
  </div>
</div>

<div class="hint">SIGNAL · TRANSMISSION</div>
<div class="day-tag">day 06 vol.2 / typo-vibe</div>

<script>
// ========== BEAST DATABASE ==========
// Real photo beasts with color signatures for matching
const BEASTS=[
  {id:'lion',        name:'사자',     src:'assets/lion.jpg',
    signature:{r:180,g:120,b:60}},    // warm orange for ginger cats
  {id:'whiteTiger',  name:'백호',     src:'assets/whiteTiger.jpg',
    signature:{r:215,g:215,b:210}},   // pale/cream
  {id:'panther',     name:'흑표범',   src:'assets/panther.jpg',
    signature:{r:30,g:30,b:32}},      // black
  {id:'cheetah',     name:'치타',     src:'assets/cheetah.jpg',
    signature:{r:160,g:135,b:95}},    // sandy tan
  {id:'wolf',        name:'늑대',     src:'assets/wolf.jpg',
    signature:{r:115,g:115,b:110}},   // neutral gray
];

// ========== DOM REFS ==========
const placeholder=document.getElementById('placeholder');
const fileInput=document.getElementById('fileInput');
const catImg=document.getElementById('catImg');
const catWrap=document.getElementById('catWrap');
const beastEl=document.getElementById('beast');
const flash=document.getElementById('flash');
const rays=document.getElementById('rays');
const glitch=document.getElementById('glitch');
const catName=document.getElementById('catName');
const beastName=document.getElementById('beastName');
const resetBtn=document.getElementById('resetBtn');

// Rays SVG (once)
rays.innerHTML=`<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rayCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,240,180,0.8)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  ${Array.from({length:16}).map((_,i)=>{
    const a=i*22.5;
    return `<polygon points="200,200 ${200+Math.cos((a-2)*Math.PI/180)*300},${200+Math.sin((a-2)*Math.PI/180)*300} ${200+Math.cos((a+2)*Math.PI/180)*300},${200+Math.sin((a+2)*Math.PI/180)*300}" fill="rgba(255,220,140,0.4)"/>`;
  }).join('')}
  <circle cx="200" cy="200" r="80" fill="url(#rayCenter)"/>
</svg>`;

// ========== FILE UPLOAD ==========
fileInput.addEventListener('change',(e)=>{
  const file=e.target.files[0];
  if(file)handleFile(file);
});

// Drag and drop
['dragover','dragenter'].forEach(ev=>{
  placeholder.addEventListener(ev,(e)=>{
    e.preventDefault();
    placeholder.classList.add('drag');
  });
});
['dragleave','drop'].forEach(ev=>{
  placeholder.addEventListener(ev,(e)=>{
    e.preventDefault();
    placeholder.classList.remove('drag');
  });
});
placeholder.addEventListener('drop',(e)=>{
  const file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('image/'))handleFile(file);
});

function handleFile(file){
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=()=>{
    showUploadedImage(url);
    const avg=extractAverageColor(img);
    const beast=matchBeast(avg);
    revealBeast(beast,avg);
  };
  img.onerror=()=>alert('이미지를 불러올 수 없어요. 다른 파일로 시도해주세요.');
  img.src=url;
}

function showUploadedImage(url){
  placeholder.style.display='none';
  catImg.src=url;
  catImg.style.display='block';
  resetBtn.style.display='block';
}

// ========== COLOR EXTRACTION ==========
// Average color of a sampled region (excluding near-transparent & extreme whites)
function extractAverageColor(img){
  const canvas=document.createElement('canvas');
  const SIZE=80;
  canvas.width=SIZE;canvas.height=SIZE;
  const ctx=canvas.getContext('2d',{willReadFrequently:true});

  // Draw centered/cropped square for representative sampling
  const s=Math.min(img.naturalWidth,img.naturalHeight);
  const sx=(img.naturalWidth-s)/2;
  const sy=(img.naturalHeight-s)/2;
  ctx.drawImage(img,sx,sy,s,s,0,0,SIZE,SIZE);

  const data=ctx.getImageData(0,0,SIZE,SIZE).data;
  let r=0,g=0,b=0,count=0;
  for(let i=0;i<data.length;i+=4){
    const R=data[i],G=data[i+1],B=data[i+2],A=data[i+3];
    if(A<128)continue;
    // Skip pure white/near-white (often background)
    if(R>245&&G>245&&B>245)continue;
    r+=R;g+=G;b+=B;count++;
  }
  if(count===0)return{r:128,g:128,b:128};
  return{r:r/count,g:g/count,b:b/count};
}

// ========== BEAST MATCHING ==========
function matchBeast(avg){
  let best=null;let bestDist=Infinity;
  for(const b of BEASTS){
    const dr=avg.r-b.signature.r;
    const dg=avg.g-b.signature.g;
    const db=avg.b-b.signature.b;
    const dist=Math.sqrt(dr*dr+dg*dg+db*db);
    if(dist<bestDist){bestDist=dist;best=b}
  }
  return best;
}

// ========== REVEAL ANIMATION ==========
function revealBeast(beast,avg){
  // Update caption
  catName.textContent='당신';
  beastName.textContent=beast.name;

  // Hide previous beast (if any)
  beastEl.classList.remove('show');
  rays.classList.remove('show');

  // Flash sequence
  setTimeout(()=>{
    flash.classList.remove('on');void flash.offsetWidth;flash.classList.add('on');
    glitch.classList.remove('on');void glitch.offsetWidth;glitch.classList.add('on');
  },300);

  // After the flash peaks, swap in the beast image
  setTimeout(()=>{
    beastEl.innerHTML=`<img class="beast-photo" src="${beast.src}" alt="${beast.name}">`;
    beastEl.classList.add('show');
    rays.classList.add('show');
  },700);
}

// ========== RESET ==========
resetBtn.addEventListener('click',()=>{
  catImg.style.display='none';
  catImg.src='';
  placeholder.style.display='flex';
  resetBtn.style.display='none';
  fileInput.value='';

  beastEl.classList.remove('show');
  rays.classList.remove('show');
  setTimeout(()=>{
    beastEl.innerHTML=`<div class="mirror-idle">
      <div class="idle-dot"></div>
      <div class="idle-dot"></div>
      <div class="idle-dot"></div>
    </div>`;
    catName.textContent='당신';
    beastName.textContent='?';
  },400);
});
</script>

</body>
</html>
