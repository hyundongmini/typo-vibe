<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 24 — 케이크 쌓기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  background:#000;
  font-family:'Pretendard',sans-serif;
}
canvas{display:block;width:100%;height:100%}

/* UI 오버레이 */
.ui{position:fixed;top:0;left:0;right:0;padding:20px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10}
.score-box{background:rgba(255,255,255,0.9);padding:12px 24px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
.score-label{font-size:12px;color:#888;margin-bottom:2px}
.score-value{font-size:32px;font-weight:900;color:#ff6b6b}
.height-box{background:rgba(255,255,255,0.9);padding:12px 24px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);text-align:right}
.height-value{font-size:24px;font-weight:700;color:#4ecdc4}

/* Perfect 텍스트 */
.perfect-text{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:48px;font-weight:900;color:#ffd93d;
  text-shadow:2px 2px 0 #ff6b6b,4px 4px 0 rgba(0,0,0,0.1);
  opacity:0;pointer-events:none;z-index:20;
  transition:none;
}
.perfect-text.show{
  animation:perfectPop 0.8s ease-out forwards;
}
@keyframes perfectPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
  100%{opacity:0;transform:translate(-50%,-80%) scale(1)}
}

/* 게임 오버 */
.game-over{
  position:fixed;inset:0;z-index:100;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(0,0,0,0.7);
  opacity:0;pointer-events:none;transition:opacity 0.5s;
}
.game-over.show{opacity:1;pointer-events:auto}
.game-over h1{font-size:48px;color:#fff;margin-bottom:8px}
.game-over .final-score{font-size:72px;font-weight:900;color:#ffd93d;margin-bottom:8px}
.game-over .final-height{font-size:24px;color:#4ecdc4;margin-bottom:24px}
.game-over button{
  padding:16px 48px;border:none;border-radius:100px;
  background:#ff6b6b;color:#fff;font:700 18px 'Pretendard',sans-serif;
  cursor:pointer;transition:transform 0.2s;
}
.game-over button:hover{transform:scale(1.05)}

/* 시작 화면 제거됨 */

.day-tag{position:fixed;bottom:14px;right:18px;font:11px/1 monospace;color:rgba(0,0,0,0.2);z-index:10}
</style>
</head>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ===== 기본 설정 =====
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a15);
scene.fog = new THREE.Fog(0x0a0a15, 15, 35);

// ===== 카메라 설정 =====
const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.1, 100);
camera.position.set(0, 4.5, 12);
camera.lookAt(0, 0.5, 0);

// ===== 조명 (생일 파티 분위기 - 강한 하이라이트) =====
const ambientLight = new THREE.AmbientLight(0x111122, 0.15);
scene.add(ambientLight);

// 보조 스포트라이트 (앞에서 - 더 강하게)
const spotLight2 = new THREE.SpotLight(0xfff8e0, 4);
spotLight2.position.set(0, 12, 6);
spotLight2.angle = Math.PI / 6;
spotLight2.penumbra = 0.4;
spotLight2.decay = 1.2;
spotLight2.distance = 50;
scene.add(spotLight2);

// 림 라이트 (뒤에서 - 윤곽 강조)
const rimLight = new THREE.PointLight(0xffaa44, 2.5, 25);
rimLight.position.set(0, 5, -6);
scene.add(rimLight);

// 고양이 쪽 조명
const catLight = new THREE.PointLight(0xffeedd, 2, 15);
catLight.position.set(4, 3, 2);
scene.add(catLight);

// ===== 파티 요소: 떨어지는 색종이 =====
const confettiParticles = [];
const confettiColors = [0xff6b6b, 0xffd93d, 0x6bcb77, 0x4d96ff, 0xff85a2, 0xb088f9];

function createConfetti() {
  const geo = new THREE.PlaneGeometry(0.08, 0.12);
  const mat = new THREE.MeshBasicMaterial({
    color: confettiColors[Math.floor(Math.random() * confettiColors.length)],
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0.9
  });
  const confetti = new THREE.Mesh(geo, mat);
  
  // 랜덤 위치 (화면 위쪽에서 시작)
  confetti.position.set(
    (Math.random() - 0.5) * 12,
    15 + Math.random() * 5,
    (Math.random() - 0.5) * 8
  );
  
  // 랜덤 회전
  confetti.rotation.set(
    Math.random() * Math.PI,
    Math.random() * Math.PI,
    Math.random() * Math.PI
  );
  
  confetti.userData = {
    velocityY: -0.02 - Math.random() * 0.03,
    rotationSpeed: (Math.random() - 0.5) * 0.1,
    swaySpeed: Math.random() * 0.02 + 0.01,
    swayOffset: Math.random() * Math.PI * 2
  };
  
  scene.add(confetti);
  confettiParticles.push(confetti);
}

// 초기 색종이 생성
for (let i = 0; i < 50; i++) {
  createConfetti();
}

// ===== 파티 요소: 반짝이는 스파클 =====
const sparkles = [];

function createSparkle() {
  const geo = new THREE.SphereGeometry(0.03, 8, 8);
  const mat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: Math.random()
  });
  const sparkle = new THREE.Mesh(geo, mat);
  
  sparkle.position.set(
    (Math.random() - 0.5) * 6,
    Math.random() * 8 + 1,
    (Math.random() - 0.5) * 4
  );
  
  sparkle.userData = {
    baseOpacity: Math.random() * 0.5 + 0.5,
    twinkleSpeed: Math.random() * 0.1 + 0.05,
    phase: Math.random() * Math.PI * 2
  };
  
  scene.add(sparkle);
  sparkles.push(sparkle);
}

for (let i = 0; i < 30; i++) {
  createSparkle();
}

// ===== 파티 요소: 풍선 =====
const balloons = [];
const balloonColors = [0xff6b6b, 0xffd93d, 0x6bcb77, 0x4d96ff, 0xff85a2];

function createBalloon(x, z) {
  const group = new THREE.Group();
  
  // 풍선 몸체
  const balloonGeo = new THREE.SphereGeometry(0.4, 16, 16);
  const balloonMat = new THREE.MeshStandardMaterial({
    color: balloonColors[Math.floor(Math.random() * balloonColors.length)],
    roughness: 0.3,
    metalness: 0.1
  });
  const balloon = new THREE.Mesh(balloonGeo, balloonMat);
  balloon.scale.set(1, 1.2, 1);
  group.add(balloon);
  
  // 풍선 꼭지
  const tipGeo = new THREE.ConeGeometry(0.08, 0.15, 8);
  const tip = new THREE.Mesh(tipGeo, balloonMat);
  tip.position.y = -0.5;
  tip.rotation.x = Math.PI;
  group.add(tip);
  
  // 끈 (선)
  const stringMat = new THREE.LineBasicMaterial({ color: 0x888888 });
  const stringPoints = [
    new THREE.Vector3(0, -0.55, 0),
    new THREE.Vector3(0.05, -1, 0),
    new THREE.Vector3(-0.05, -1.5, 0),
    new THREE.Vector3(0, -2, 0)
  ];
  const stringGeo = new THREE.BufferGeometry().setFromPoints(stringPoints);
  const string = new THREE.Line(stringGeo, stringMat);
  group.add(string);
  
  group.position.set(x, 3 + Math.random() * 2, z);
  group.userData = {
    floatSpeed: Math.random() * 0.01 + 0.005,
    floatOffset: Math.random() * Math.PI * 2,
    swayAmount: Math.random() * 0.3 + 0.1
  };
  
  scene.add(group);
  balloons.push(group);
}

// 풍선 배치 (양쪽에)
createBalloon(-4, 0);
createBalloon(-4.5, 2);
createBalloon(5, 1);
createBalloon(5.5, -1);

// ===== 바닥 (케이크 받침대) =====
const plateGeo = new THREE.CylinderGeometry(2.5, 2.7, 0.25, 32);
const plateMat = new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.1, roughness: 0.3 });
const plate = new THREE.Mesh(plateGeo, plateMat);
plate.position.y = 0.125;
plate.receiveShadow = true;
scene.add(plate);

// ===== 케이크 색상 팔레트 =====
const cakeColors = [
  0xffb3ba, // 핑크
  0xffdfba, // 피치
  0xffffba, // 레몬
  0xbaffc9, // 민트
  0xbae1ff, // 스카이
  0xe2baff, // 라벤더
];

const creamColors = [
  0xffffff, // 화이트
  0xfff5e6, // 크림
  0xffe4e1, // 미스티로즈
];

// ===== 케이크 층 생성 함수 =====
function createCakeLayer(radius = 1.2, height = 0.5) {
  const group = new THREE.Group();
  
  // 케이크 몸체 (원기둥)
  const cakeGeo = new THREE.CylinderGeometry(radius, radius, height, 32);
  const cakeColor = cakeColors[Math.floor(Math.random() * cakeColors.length)];
  const cakeMat = new THREE.MeshStandardMaterial({ 
    color: cakeColor, 
    roughness: 0.8,
    metalness: 0.0
  });
  const cake = new THREE.Mesh(cakeGeo, cakeMat);
  cake.castShadow = true;
  cake.receiveShadow = true;
  group.add(cake);
  
  // 크림 장식 (위쪽 테두리)
  const creamColor = creamColors[Math.floor(Math.random() * creamColors.length)];
  const creamGeo = new THREE.TorusGeometry(radius * 0.85, 0.1, 8, 32);
  const creamMat = new THREE.MeshStandardMaterial({ color: creamColor, roughness: 0.6 });
  const cream = new THREE.Mesh(creamGeo, creamMat);
  cream.rotation.x = Math.PI / 2;
  cream.position.y = height / 2;
  cream.castShadow = true;
  group.add(cream);
  
  // 작은 장식 (랜덤 토핑)
  const toppingCount = Math.floor(Math.random() * 4) + 2;
  for (let i = 0; i < toppingCount; i++) {
    const angle = (i / toppingCount) * Math.PI * 2 + Math.random() * 0.5;
    const toppingGeo = new THREE.SphereGeometry(0.06, 8, 8);
    const toppingMat = new THREE.MeshStandardMaterial({ 
      color: cakeColors[Math.floor(Math.random() * cakeColors.length)] 
    });
    const topping = new THREE.Mesh(toppingGeo, toppingMat);
    topping.position.set(
      Math.cos(angle) * radius * 0.65,
      height / 2 + 0.08,
      Math.sin(angle) * radius * 0.65
    );
    group.add(topping);
  }
  
  group.userData = { radius, height };
  return group;
}

// ===== 게임 상태 =====
let gameStarted = false;
let gameOver = false;
let score = 0;
let stackedLayers = [];
let currentLayer = null;
let swingAngle = 0;
let swingSpeed = 0.03;
let swingAmplitude = 3;
let dropSpeed = 0;
let isDropping = false;
let currentRadius = 1.2;
let perfectCount = 0;
let layerHeight = 0.5;

// Birthday Cat 모델
let catModel = null;
let catLoaded = false;

// ===== 고양이 색상 + 리액션 =====
let catOriginalY = 0.15;
let catReactionTimer = null;

// 고양이 리액션 함수
function catReaction(type) {
  if (!catModel) return;
  
  // 기존 타이머 취소
  if (catReactionTimer) clearTimeout(catReactionTimer);
  
  if (type === 'perfect') {
    // 기쁨 점프!
    let jumpPhase = 0;
    const jumpAnim = () => {
      jumpPhase += 0.15;
      catModel.position.y = catOriginalY + Math.sin(jumpPhase) * 0.3;
      catModel.rotation.z = Math.sin(jumpPhase * 2) * 0.1;
      if (jumpPhase < Math.PI * 2) {
        requestAnimationFrame(jumpAnim);
      } else {
        catModel.position.y = catOriginalY;
        catModel.rotation.z = 0;
      }
    };
    jumpAnim();
  } else if (type === 'good') {
    // 고개 끄덕
    let nodPhase = 0;
    const nodAnim = () => {
      nodPhase += 0.2;
      catModel.rotation.x = Math.sin(nodPhase) * 0.15;
      if (nodPhase < Math.PI * 2) {
        requestAnimationFrame(nodAnim);
      } else {
        catModel.rotation.x = 0;
      }
    };
    nodAnim();
  } else if (type === 'fail') {
    // 슬픔 - 고개 숙임
    let sadPhase = 0;
    const sadAnim = () => {
      sadPhase += 0.05;
      catModel.rotation.x = Math.min(sadPhase, 0.3);
      catModel.position.y = catOriginalY - Math.min(sadPhase * 0.3, 0.1);
      if (sadPhase < 0.3) {
        requestAnimationFrame(sadAnim);
      }
    };
    sadAnim();
    
    // 2초 후 복귀
    catReactionTimer = setTimeout(() => {
      catModel.rotation.x = 0;
      catModel.position.y = catOriginalY;
    }, 2000);
  }
}

// ===== Birthday Cat 로드 =====
const loader = new GLTFLoader();
loader.load(
  './Meshy_AI_Birthday_Cat_0518090039_generate.glb',
  (gltf) => {
    catModel = gltf.scene;
    
    // 크기와 위치 조정
    catModel.scale.set(1.6, 1.6, 1.6);
    catModel.position.set(3, catOriginalY, 1.2);
    catModel.rotation.y = -Math.PI / 2.2;
    
    // 바운딩 박스 계산 (높이 기준 색상 적용용)
    const box = new THREE.Box3().setFromObject(catModel);
    const minY = box.min.y;
    const maxY = box.max.y;
    const height = maxY - minY;
    
    // 커스텀 셰이더 재질 - 흰색 + 검정 패치
    const catShaderMaterial = new THREE.ShaderMaterial({
      uniforms: {
        minY: { value: minY },
        maxY: { value: maxY },
        lightDir: { value: new THREE.Vector3(1, 1, 1).normalize() }
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vPosition;
        varying vec3 vWorldPosition;
        
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vPosition = position;
          vec4 worldPos = modelMatrix * vec4(position, 1.0);
          vWorldPosition = worldPos.xyz;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float minY;
        uniform float maxY;
        uniform vec3 lightDir;
        
        varying vec3 vNormal;
        varying vec3 vPosition;
        varying vec3 vWorldPosition;
        
        // 노이즈 함수 (패치 경계를 자연스럽게)
        float hash(vec2 p) {
          return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
        }
        
        float noise(vec2 p) {
          vec2 i = floor(p);
          vec2 f = fract(p);
          f = f * f * (3.0 - 2.0 * f);
          return mix(
            mix(hash(i), hash(i + vec2(1.0, 0.0)), f.x),
            mix(hash(i + vec2(0.0, 1.0)), hash(i + vec2(1.0, 1.0)), f.x),
            f.y
          );
        }
        
        void main() {
          float heightRatio = (vWorldPosition.y - minY) / (maxY - minY);
          
          // 기본 흰색
          vec3 white = vec3(0.98, 0.98, 0.98);
          vec3 black = vec3(0.15, 0.15, 0.18);
          vec3 pink = vec3(1.0, 0.6, 0.7);
          
          // 노이즈로 패치 경계 부드럽게
          float n = noise(vWorldPosition.xz * 3.0);
          float n2 = noise(vWorldPosition.xy * 2.5 + 10.0);
          
          // 패치 영역 정의
          float isBlack = 0.0;
          
          // 1. 머리 위쪽 (5:5 가르마 - 한쪽만 검정)
          if (heightRatio > 0.75) {
            // 머리 위쪽에서 X좌표 기준으로 한쪽만 검정
            if (vWorldPosition.x + n * 0.1 > 0.05) {
              isBlack = smoothstep(0.75, 0.8, heightRatio);
            }
          }
          
          // 2. 등/옆구리 패치 (뒤쪽 + 위쪽)
          if (heightRatio > 0.3 && heightRatio < 0.8) {
            // 노멀이 위/뒤를 향하면 검정 (등 부분)
            float backFactor = max(0.0, -vNormal.z) + max(0.0, vNormal.y) * 0.5;
            if (backFactor > 0.3 + n * 0.2) {
              isBlack = max(isBlack, smoothstep(0.3, 0.5, backFactor));
            }
          }
          
          // 3. 꼬리 (높이 중간, 뒤쪽)
          if (heightRatio > 0.2 && heightRatio < 0.5 && vWorldPosition.z < -0.1) {
            isBlack = max(isBlack, 0.7);
          }
          
          // 색상 믹스
          vec3 baseColor = mix(white, black, isBlack);
          
          // 파티모자 영역 (맨 위) - 핑크
          if (heightRatio > 0.92) {
            baseColor = pink;
          }
          
          // 간단한 조명
          float diffuse = max(0.0, dot(vNormal, lightDir));
          float ambient = 0.4;
          float light = ambient + diffuse * 0.6;
          
          gl_FragColor = vec4(baseColor * light, 1.0);
        }
      `
    });
    
    // 모든 메쉬에 셰이더 적용
    catModel.traverse((child) => {
      if (child.isMesh) {
        const name = child.name.toLowerCase();
        
        // 파티모자는 별도 핑크 재질
        if (name.includes('hat') || name.includes('cone') || name.includes('cap') || name.includes('party')) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0xffb6c1,
            roughness: 0.7,
            metalness: 0.1,
          });
        } else {
          // 고양이 몸체는 커스텀 셰이더
          child.material = catShaderMaterial.clone();
        }
        
        child.castShadow = true;
        child.receiveShadow = true;
        
        console.log('Cat mesh:', name);
      }
    });
    
    scene.add(catModel);
    catLoaded = true;
    console.log('Birthday Cat loaded with custom shader!');
  },
  undefined,
  (error) => {
    console.error('Cat load error:', error);
    createPlaceholderCat();
  }
);

// ===== 대체 고양이 (로드 실패 시) =====
function createPlaceholderCat() {
  const group = new THREE.Group();
  
  // 몸통
  const bodyGeo = new THREE.SphereGeometry(0.5, 16, 16);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xffaa66 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.scale.set(1, 0.8, 0.7);
  group.add(body);
  
  // 머리
  const headGeo = new THREE.SphereGeometry(0.35, 16, 16);
  const head = new THREE.Mesh(headGeo, bodyMat);
  head.position.set(0, 0.5, 0.2);
  group.add(head);
  
  // 귀
  const earGeo = new THREE.ConeGeometry(0.12, 0.25, 4);
  const ear1 = new THREE.Mesh(earGeo, bodyMat);
  ear1.position.set(-0.2, 0.8, 0.2);
  ear1.rotation.z = -0.2;
  group.add(ear1);
  
  const ear2 = new THREE.Mesh(earGeo, bodyMat);
  ear2.position.set(0.2, 0.8, 0.2);
  ear2.rotation.z = 0.2;
  group.add(ear2);
  
  // 눈
  const eyeGeo = new THREE.SphereGeometry(0.06, 8, 8);
  const eyeMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
  const eye1 = new THREE.Mesh(eyeGeo, eyeMat);
  eye1.position.set(-0.12, 0.55, 0.45);
  group.add(eye1);
  
  const eye2 = new THREE.Mesh(eyeGeo, eyeMat);
  eye2.position.set(0.12, 0.55, 0.45);
  group.add(eye2);
  
  // 파티 모자
  const hatGeo = new THREE.ConeGeometry(0.2, 0.4, 16);
  const hatMat = new THREE.MeshStandardMaterial({ color: 0xff6b6b });
  const hat = new THREE.Mesh(hatGeo, hatMat);
  hat.position.set(0, 0.9, 0.2);
  group.add(hat);
  
  group.position.set(3.5, 0.5, 2);
  group.rotation.y = -Math.PI / 3;
  scene.add(group);
  catModel = group;
  catLoaded = true;
  console.log('Placeholder cat created');
}

// ===== 베이스 케이크 (첫 번째 층 - 자동 배치) =====
function createBaseLayer() {
  const base = createCakeLayer(currentRadius, layerHeight);
  base.position.set(0, 0.25 + layerHeight / 2, 0);
  scene.add(base);
  stackedLayers.push(base);
}

// ===== 새 케이크 층 생성 =====
function spawnNewLayer() {
  if (gameOver) return;
  
  // 층이 쌓일수록 반지름 약간 감소
  currentRadius = Math.max(0.6, 1.2 - stackedLayers.length * 0.02);
  
  currentLayer = createCakeLayer(currentRadius, layerHeight);
  
  // 현재 쌓인 높이 계산
  const stackHeight = 0.25 + stackedLayers.length * layerHeight + layerHeight / 2;
  const startY = stackHeight + 2.5; // 위에서 시작
  
  // 중앙에서 시작 (swingAngle = 0)
  swingAngle = 0;
  currentLayer.position.set(0, startY, 0);
  scene.add(currentLayer);
  
  isDropping = false;
  dropSpeed = 0;
  
  // 속도 증가 (층이 쌓일수록 빨라짐)
  swingSpeed = 0.03 + stackedLayers.length * 0.003;
  swingAmplitude = Math.max(1.5, 3 - stackedLayers.length * 0.1);
}

// ===== 케이크 떨어뜨리기 =====
function dropLayer() {
  if (!currentLayer || isDropping || gameOver) return;
  isDropping = true;
  dropSpeed = 0;
}

// ===== 쌓기 판정 =====
function checkStack() {
  const stackHeight = 0.25 + stackedLayers.length * layerHeight + layerHeight / 2;
  const layerX = currentLayer.position.x;
  const prevLayer = stackedLayers[stackedLayers.length - 1];
  const prevRadius = prevLayer ? prevLayer.userData.radius : currentRadius;
  
  // 오차 계산 (중앙 = 0)
  const offset = Math.abs(layerX);
  const tolerance = currentRadius * 0.9; // 허용 오차
  
  if (offset > tolerance) {
    // 실패 - 너무 삐뚤어짐
    catReaction('fail');
    shakeScreen();
    triggerGameOver();
    return;
  }
  
  // 성공!
  let newRadius = currentRadius;
  let points = 100;
  let isPerfect = false;
  
  if (offset < 0.12) {
    // Perfect! - 케이크 크기 복구
    points = 300;
    perfectCount++;
    isPerfect = true;
    
    // 3연속 Perfect 시 케이크 크기 복구 (Stack 게임 메카닉)
    if (perfectCount >= 3 && currentRadius < 1.2) {
      newRadius = Math.min(1.2, currentRadius + 0.05);
      showPerfectText('SIZE UP!');
    } else {
      showPerfectText();
    }
    catReaction('perfect');
    
    // Perfect는 중앙 정렬
    currentLayer.position.x = 0;
  } else if (offset < 0.35) {
    // Good
    points = 200;
    perfectCount = 0;
    catReaction('good');
    
    // 약간의 오차 유지
    currentLayer.position.x = layerX * 0.3;
    
    // 케이크 크기 약간 감소
    newRadius = Math.max(0.5, currentRadius - offset * 0.15);
  } else {
    // OK - 케이크 크기 더 감소
    perfectCount = 0;
    newRadius = Math.max(0.4, currentRadius - offset * 0.25);
    currentLayer.position.x = layerX * 0.5;
    
    // 화면 살짝 흔들림
    shakeScreen(0.3);
  }
  
  currentLayer.position.y = stackHeight;
  currentLayer.userData.radius = newRadius;
  stackedLayers.push(currentLayer);
  
  // 다음 층 크기 업데이트
  currentRadius = newRadius;
  
  // 콤보 보너스
  points += perfectCount * 50;
  
  score += points;
  updateUI();
  
  // 다음 층
  currentLayer = null;
  setTimeout(spawnNewLayer, 400);
}

// ===== 화면 흔들림 효과 =====
let isShaking = false;

function shakeScreen(intensity = 1) {
  if (isShaking) return; // 이미 흔들리는 중이면 무시
  isShaking = true;
  
  const originalX = 0;
  const originalZ = 12;
  let shakeTime = 0;
  
  const shake = () => {
    shakeTime += 0.1;
    const decay = Math.max(0, 1 - shakeTime / 0.5);
    camera.position.x = originalX + (Math.random() - 0.5) * 0.2 * intensity * decay;
    camera.position.z = originalZ + (Math.random() - 0.5) * 0.1 * intensity * decay;
    
    if (shakeTime < 0.5) {
      requestAnimationFrame(shake);
    } else {
      camera.position.x = originalX;
      camera.position.z = originalZ;
      isShaking = false;
    }
  };
  shake();
}

// ===== 게임 오버 =====
function triggerGameOver() {
  gameOver = true;
  
  // 화면 흔들림 (한 번만)
  shakeScreen(1.5);
  
  // 현재 층 떨어지는 애니메이션
  const fallLayer = currentLayer;
  if (fallLayer) {
    const fallAnim = () => {
      if (fallLayer && fallLayer.parent) {
        fallLayer.position.y -= 0.15;
        fallLayer.rotation.z += 0.08;
        fallLayer.rotation.x += 0.03;
        if (fallLayer.position.y > -3) {
          requestAnimationFrame(fallAnim);
        } else {
          scene.remove(fallLayer);
        }
      }
    };
    fallAnim();
  }
  
  // UI 업데이트
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalHeight').textContent = `${stackedLayers.length}층 달성!`;
  
  // 게임 오버 화면 표시
  setTimeout(() => {
    const gameOverEl = document.getElementById('gameOver');
    gameOverEl.style.opacity = '1';
    gameOverEl.style.pointerEvents = 'auto';
    gameOverEl.classList.add('show');
  }, 600);
}

// ===== Perfect 텍스트 =====
function showPerfectText(customText = null) {
  const el = document.getElementById('perfectText');
  el.classList.remove('show');
  void el.offsetWidth; // reflow
  
  if (customText) {
    el.textContent = customText;
  } else {
    el.textContent = perfectCount > 1 ? `PERFECT x${perfectCount}!` : 'PERFECT!';
  }
  el.classList.add('show');
  
  // 파티클 효과
  spawnParticles();
}

// ===== 파티클 효과 =====
function spawnParticles() {
  if (!currentLayer) return; // currentLayer가 없으면 무시
  
  const particles = [];
  const spawnPos = currentLayer.position.clone();
  
  for (let i = 0; i < 15; i++) {
    const geo = new THREE.SphereGeometry(0.04, 8, 8);
    const mat = new THREE.MeshBasicMaterial({ 
      color: cakeColors[Math.floor(Math.random() * cakeColors.length)],
      transparent: true
    });
    const p = new THREE.Mesh(geo, mat);
    p.position.copy(spawnPos);
    p.userData.velocity = new THREE.Vector3(
      (Math.random() - 0.5) * 0.2,
      Math.random() * 0.15 + 0.1,
      (Math.random() - 0.5) * 0.2
    );
    p.userData.life = 1;
    scene.add(p);
    particles.push(p);
  }
  
  function animateParticles() {
    let alive = false;
    particles.forEach(p => {
      if (p.userData.life > 0) {
        alive = true;
        p.position.add(p.userData.velocity);
        p.userData.velocity.y -= 0.008;
        p.userData.life -= 0.025;
        p.material.opacity = p.userData.life;
        p.scale.multiplyScalar(0.97);
      }
    });
    if (alive) requestAnimationFrame(animateParticles);
    else particles.forEach(p => scene.remove(p));
  }
  animateParticles();
}

// ===== UI 업데이트 =====
function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('height').textContent = stackedLayers.length + '층';
}

// ===== 게임 시작 (바로 시작) =====
function startGame() {
  document.getElementById('gameUI').style.display = 'flex';
  
  gameStarted = true;
  gameOver = false;
  score = 0;
  stackedLayers = [];
  currentRadius = 1.2;
  perfectCount = 0;
  swingAngle = 0;
  
  // 베이스 케이크 배치
  createBaseLayer();
  updateUI();
  
  // 첫 번째 움직이는 층 생성
  setTimeout(spawnNewLayer, 300);
}

// 페이지 로드 시 바로 게임 시작
window.addEventListener('load', () => {
  setTimeout(startGame, 500);
});

// ===== 게임 재시작 =====
function restartGame() {
  console.log('Restarting game...');
  
  // 게임오버 UI 완전히 숨기기
  const gameOverEl = document.getElementById('gameOver');
  gameOverEl.classList.remove('show');
  gameOverEl.style.opacity = '0';
  gameOverEl.style.pointerEvents = 'none';
  
  // 기존 케이크 제거
  stackedLayers.forEach(layer => scene.remove(layer));
  stackedLayers = [];
  
  if (currentLayer) {
    scene.remove(currentLayer);
    currentLayer = null;
  }
  
  // 카메라 리셋 - 초기 위치
  camera.position.set(0, 4.5, 12);
  camera.lookAt(0, 0.5, 0);
  currentCamY = 4.5;
  currentLookY = 0.5;
  isShaking = false; // 흔들림 상태 리셋
  
  // 조명 리셋
  spotLight.position.y = 15;
  spotLight.target.position.y = 0;
  spotLight2.position.y = 12;
  rimLight.position.y = 5;
  
  // 고양이 리액션 리셋
  if (catModel) {
    catModel.rotation.x = 0;
    catModel.rotation.z = 0;
    catModel.position.y = catOriginalY;
  }
  
  // 게임 상태 리셋
  gameStarted = true;
  gameOver = false;
  score = 0;
  currentRadius = 1.2;
  perfectCount = 0;
  swingAngle = 0;
  isDropping = false;
  dropSpeed = 0;
  
  // 베이스 케이크 배치
  createBaseLayer();
  updateUI();
  
  // 새 층 생성
  setTimeout(spawnNewLayer, 300);
}

window.restartGame = restartGame;

// ===== 입력 처리 =====
const gameOverEl = document.getElementById('gameOver');
const restartBtn = document.getElementById('restartBtn');

// 다시하기 버튼 클릭 - mousedown으로 즉시 반응
restartBtn.addEventListener('mousedown', (e) => {
  e.preventDefault();
  e.stopPropagation();
  restartGame();
});

restartBtn.addEventListener('touchstart', (e) => {
  e.preventDefault();
  e.stopPropagation();
  restartGame();
}, { passive: false });

// 게임 클릭 (게임오버 화면 제외)
window.addEventListener('click', (e) => {
  // 게임오버 화면이 보이면 무시
  if (gameOverEl.classList.contains('show')) return;
  
  if (gameStarted && !gameOver) dropLayer();
});

window.addEventListener('touchstart', (e) => {
  if (gameOverEl.classList.contains('show')) return;
  
  if (gameStarted && !gameOver) dropLayer();
}, { passive: true });

window.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameStarted && !gameOver) dropLayer();
  }
});

// ===== 애니메이션 루프 =====
const clock = new THREE.Clock();
let time = 0;

// 카메라 부드러운 이동을 위한 변수
let currentCamY = 4.5;
let currentLookY = 0.5;

function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  time += delta;
  
  if (currentLayer && !isDropping) {
    // 좌우 흔들림 (사인파)
    swingAngle += swingSpeed;
    currentLayer.position.x = Math.sin(swingAngle) * swingAmplitude;
  }
  
  if (currentLayer && isDropping) {
    // 낙하
    dropSpeed += 0.012;
    currentLayer.position.y -= dropSpeed;
    
    const targetY = 0.25 + stackedLayers.length * layerHeight + layerHeight / 2;
    if (currentLayer.position.y <= targetY) {
      currentLayer.position.y = targetY;
      checkStack();
    }
  }
  
  // 카메라 - 매우 부드러운 이동
  if (gameStarted && !gameOver && !isShaking) {
    // 쌓인 케이크의 최상단 높이 기준
    const stackTopY = 0.25 + stackedLayers.length * layerHeight;
    
    // 목표 카메라 위치
    const targetCamY = stackTopY + 5.5;
    const targetLookY = stackTopY + 0.5;
    
    // 매우 부드러운 보간 (lerp factor 낮춤)
    currentCamY += (targetCamY - currentCamY) * 0.015;
    currentLookY += (targetLookY - currentLookY) * 0.015;
    
    camera.position.y = currentCamY;
    camera.lookAt(0, currentLookY, 0);
    
    // 조명도 부드럽게
    spotLight.position.y += (stackTopY + 12 - spotLight.position.y) * 0.015;
    spotLight.target.position.y += (stackTopY - spotLight.target.position.y) * 0.015;
    spotLight2.position.y += (stackTopY + 10 - spotLight2.position.y) * 0.015;
    rimLight.position.y += (stackTopY + 3 - rimLight.position.y) * 0.015;
  }
  
  // ===== 파티 요소 애니메이션 =====
  
  // 색종이 애니메이션
  confettiParticles.forEach((c, i) => {
    c.position.y += c.userData.velocityY;
    c.position.x += Math.sin(time * c.userData.swaySpeed + c.userData.swayOffset) * 0.01;
    c.rotation.x += c.userData.rotationSpeed;
    c.rotation.y += c.userData.rotationSpeed * 0.7;
    
    // 화면 아래로 떨어지면 위로 리셋
    if (c.position.y < -2) {
      c.position.y = 15 + Math.random() * 5;
      c.position.x = (Math.random() - 0.5) * 12;
    }
  });
  
  // 스파클 반짝임
  sparkles.forEach(s => {
    s.userData.phase += s.userData.twinkleSpeed;
    s.material.opacity = s.userData.baseOpacity * (0.5 + 0.5 * Math.sin(s.userData.phase));
    s.scale.setScalar(0.8 + 0.4 * Math.sin(s.userData.phase));
  });
  
  // 풍선 둥둥
  balloons.forEach(b => {
    b.position.y += Math.sin(time * b.userData.floatSpeed * 10 + b.userData.floatOffset) * 0.003;
    b.rotation.z = Math.sin(time + b.userData.floatOffset) * b.userData.swayAmount * 0.1;
  });
  
  renderer.render(scene, camera);
}

animate();

// ===== 리사이즈 =====
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
