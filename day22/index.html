<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 22</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:url('BG.png') center/cover no-repeat #000}
canvas{position:fixed;inset:0;z-index:1}
.hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
  font:400 12px/1 'system-ui',sans-serif;color:rgba(255,255,255,0.4);
  background:rgba(0,0,0,0.3);padding:6px 14px;border-radius:20px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">click to explode · SPACE to switch mode (1: scatter ↔ form · 2: rain · 3: DNA)</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// ===== 파티클 시스템 =====
const particles = [];
const PARTICLE_SIZE = 3;    // 샘플링 간격 (작을수록 정밀, 무거움)
const SAMPLE_GAP = 4;       // 픽셀 건너뛰기
let imageLoaded = false;
let isExploding = false;

// BG 이미지 로드 (트레일 효과용)
const bgImg = new Image();
bgImg.src = 'BG.png';

// ===== title.png 로드 → 픽셀 추출 → 파티클 생성 =====
const img = new Image();
img.crossOrigin = 'anonymous';
img.onload = () => {
  imageLoaded = true;
  console.log('Image loaded:', img.width, img.height);

  const offCanvas = document.createElement('canvas');
  const offCtx = offCanvas.getContext('2d');

  const scale = Math.min((W * 0.85) / img.width, (H * 0.8) / img.height);
  const iw = img.width * scale;
  const ih = img.height * scale;
  imgDrawW = iw;
  imgDrawH = ih;
  imgDrawX = (W - iw) / 2;
  imgDrawY = (H - ih) / 2;
  offCanvas.width = iw;
  offCanvas.height = ih;
  offCtx.drawImage(img, 0, 0, iw, ih);

  let imageData;
  try {
    imageData = offCtx.getImageData(0, 0, iw, ih);
  } catch(e) {
    console.error('getImageData failed (CORS):', e);
    // Fallback: 이미지 전체를 균일 그리드로 파티클 생성
    for (let y = 0; y < ih; y += SAMPLE_GAP) {
      for (let x = 0; x < iw; x += SAMPLE_GAP) {
        const targetX = imgDrawX + x;
        const targetY = imgDrawY + y;
        particles.push({
          x: Math.random() * W, y: Math.random() * H,
          targetX, targetY, originX: targetX, originY: targetY,
          vx: 0, vy: 0,
          color: `hsl(${35 + Math.random()*15}, 100%, ${50 + Math.random()*10}%)`,
          size: PARTICLE_SIZE,
          ease: 0.02 + Math.random() * 0.03,
        });
      }
    }
    console.log('Fallback particles:', particles.length);
    animate();
    return;
  }

  const data = imageData.data;
  console.log('ImageData OK, scanning pixels...');

  // title.png에서 노란/주황 픽셀 위치만 추출
  let count = 0;
  for (let y = 0; y < ih; y += SAMPLE_GAP) {
    for (let x = 0; x < iw; x += SAMPLE_GAP) {
      const i = (y * Math.floor(iw) + x) * 4;
      const r = data[i], g = data[i+1], b = data[i+2], a = data[i+3];
      if (a < 30) continue;

      // 노란/주황 텍스트: R>200, G>120, B<80
      if (!(r > 200 && g > 120 && b < 80)) continue;
      count++;

      const targetX = imgDrawX + x;
      const targetY = imgDrawY + y;
      const color = `rgb(${r},${g},${b})`;

      particles.push({
        x: Math.random() * W,  // 시작: 랜덤 위치
        y: Math.random() * H,
        targetX, targetY, originX: targetX, originY: targetY,
        vx: 0, vy: 0, color, size: PARTICLE_SIZE,
        ease: 0.02 + Math.random() * 0.03,
      });
    }
  }
  console.log('Yellow pixels found:', count, 'Particles:', particles.length);

  // 애니메이션 시작
  animate();
};
img.src = 'title_new.png';

// ===== 마우스 인터랙션 =====
let mouseDown = false;
let mouseX = 0, mouseY = 0;

canvas.addEventListener('mousedown', (e) => {
  mouseDown = true;
  isExploding = true;
  mouseX = e.clientX;
  mouseY = e.clientY;
  explodeFrom(mouseX, mouseY);
});

canvas.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (mouseDown) {
    explodeFrom(mouseX, mouseY);
  }
});

canvas.addEventListener('mouseup', () => {
  mouseDown = false;
  isExploding = false;
  // 다시 원래 위치로 수렴
  for (const p of particles) {
    p.targetX = p.originX;
    p.targetY = p.originY;
  }
});

canvas.addEventListener('mouseleave', () => {
  mouseDown = false;
  isExploding = false;
  for (const p of particles) {
    p.targetX = p.originX;
    p.targetY = p.originY;
  }
});

// 터치 지원
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  mouseDown = true;
  isExploding = true;
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  explodeFrom(mouseX, mouseY);
});
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  if (mouseDown) explodeFrom(mouseX, mouseY);
});
canvas.addEventListener('touchend', () => {
  mouseDown = false;
  isExploding = false;
  for (const p of particles) {
    p.targetX = p.originX;
    p.targetY = p.originY;
  }
});

// ===== 폭발: 클릭 지점에서 방사형으로 밀어냄 =====
function explodeFrom(mx, my) {
  for (const p of particles) {
    const dx = p.x - mx;
    const dy = p.y - my;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const radius = 200; // 폭발 반경

    if (dist < radius) {
      const force = (radius - dist) / radius * 8;
      const angle = Math.atan2(dy, dx);
      p.vx += Math.cos(angle) * force;
      p.vy += Math.sin(angle) * force;
    }
  }
}

// ===== 모드 시스템 =====
let currentMode = 1; // 1: scatter↔form, 2: rain, 3: DNA
let modeTime = 0;

addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    currentMode = currentMode % 3 + 1; // 1→2→3→1
    modeTime = 0;
    stateTimer = 0;
    showOriginalImage = false;
    fadeInImage = false;
    imageOpacity = 0;
    initMode(currentMode);
    document.querySelector('.hint').textContent = 
      `MODE ${currentMode} · ` + ['', 'scatter ↔ form', 'rain', 'DNA helix'][currentMode];
  }
});

function initMode(mode) {
  if (mode === 2) {
    // 빗방울: 파티클을 화면 위로 배치
    for (const p of particles) {
      p.x = p.originX + (Math.random() - 0.5) * 100;
      p.y = -Math.random() * H;
      p.vx = 0;
      p.vy = 2 + Math.random() * 4;
      p.targetX = p.originX;
      p.targetY = H + 100; // 아래로 떨어짐
    }
    state = 'scatter';
  } else if (mode === 3) {
    // DNA: 파티클을 현재 위치에서 시작
    state = 'scatter';
    for (const p of particles) {
      p.vx = 0; p.vy = 0;
    }
  } else {
    // 모드1: 기본 scatter
    state = 'scatter';
    for (const p of particles) {
      p.targetX = Math.random() * W;
      p.targetY = Math.random() * H;
      p.vx += (Math.random() - 0.5) * 4;
      p.vy += (Math.random() - 0.5) * 4;
    }
  }
}

// ===== 상태 관리: 원본 이미지 ↔ 픽셀 흩어짐 반복 =====
let state = 'scatter'; // 처음엔 흩어진 상태로 시작
let stateTimer = 0;
const IMAGE_DURATION = 3000;
const SCATTER_DURATION = 3000;
let showOriginalImage = false;
let imageOpacity = 0;
let fadeInImage = false;

let imgDrawX, imgDrawY, imgDrawW, imgDrawH;

function switchState() {
  if (state === 'image') {
    state = 'scatter';
    showOriginalImage = false;
    fadeInImage = false;
    imageOpacity = 0;
    // 화면 전체로 흩어짐
    for (const p of particles) {
      p.targetX = Math.random() * W;
      p.targetY = Math.random() * H;
      p.vx += (Math.random() - 0.5) * 6;
      p.vy += (Math.random() - 0.5) * 6;
    }
  } else {
    state = 'image';
    // 외곽선 위치로 수렴 → 이미지 전환
    for (const p of particles) {
      p.targetX = p.originX;
      p.targetY = p.originY;
    }
    // 파티클이 모이면 원본 이미지를 페이드인
    imageOpacity = 0;
    setTimeout(() => {
      if (state === 'image') {
        showOriginalImage = true;
        fadeInImage = true;
      }
    }, 2500);
  }
}

// ===== 애니메이션 루프 =====
let lastTime = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt = now - lastTime;
  lastTime = now;

  if (!mouseDown) {
    stateTimer += dt;
    modeTime += dt * 0.001;

    if (currentMode === 1) {
      // 모드1: 기존 scatter ↔ form 반복
      const duration = state === 'image' ? IMAGE_DURATION : SCATTER_DURATION;
      if (stateTimer >= duration) {
        stateTimer = 0;
        switchState();
      }
    } else if (currentMode === 2) {
      // 모드2: 빗방울 낙하(4초) → 전체 한번에 떨어짐(2초) → 위에서 다시
      if (state === 'scatter') {
        if (stateTimer >= 4000) {
          stateTimer = 0;
          state = 'image';
          // 전체 파티클에 아래로 초기 속도 부여
          for (const p of particles) { p.vy = 2 + Math.random() * 2; }
        }
      } else {
        if (stateTimer >= 2000) {
          stateTimer = 0;
          state = 'scatter';
          // 전체를 위에서 리셋
          for (const p of particles) {
            p.y = -Math.random() * 400;
            p.x = p.originX + (Math.random() - 0.5) * 100;
            p.vy = 1 + Math.random() * 2;
            p.vx = 0;
          }
        }
      }
    }
  }

  // 트레일 효과
  ctx.globalAlpha = 0.15;
  const bgScale = Math.max(W / bgImg.width, H / bgImg.height);
  const bgW = bgImg.width * bgScale;
  const bgH = bgImg.height * bgScale;
  const bgX = (W - bgW) / 2;
  const bgY = (H - bgH) / 2;
  ctx.drawImage(bgImg, bgX, bgY, bgW, bgH);
  ctx.globalAlpha = 1;

  if (showOriginalImage && !isExploding) {
    // 페이드인
    if (fadeInImage && imageOpacity < 1) {
      imageOpacity += 0.02;
      if (imageOpacity >= 1) { imageOpacity = 1; fadeInImage = false; }
    }
    ctx.globalAlpha = imageOpacity;
    ctx.drawImage(img, imgDrawX, imgDrawY, imgDrawW, imgDrawH);
    ctx.globalAlpha = 1;

    // 페이드인 중엔 파티클도 서서히 사라지게
    if (imageOpacity < 1) {
      for (const p of particles) {
        const dx = p.targetX - p.x;
        const dy = p.targetY - p.y;
        p.vx += dx * p.ease;
        p.vy += dy * p.ease;
        p.vx *= 0.92; p.vy *= 0.92;
        p.x += p.vx; p.y += p.vy;
        ctx.globalAlpha = 1 - imageOpacity;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  } else {
    // 파티클 렌더링
    for (let idx = 0; idx < particles.length; idx++) {
      const p = particles[idx];

      if (currentMode === 2 && !isExploding) {
        // 모드2: 빗방울 낙하 → 글자로 고임 → 전체가 한번에 떨어짐
        if (state === 'scatter') {
          // 위에서 떨어져서 글자로 고이는 중
          p.vy += 0.12;
          p.vx += (Math.random() - 0.5) * 0.05;
          p.x += p.vx;
          p.y += p.vy;
          if (p.y >= p.originY) {
            p.y = p.originY;
            p.x += (p.originX - p.x) * 0.15;
            p.vy = 0; p.vx *= 0.5;
          }
        } else {
          // 전체가 한번에 아래로 떨어짐 (가속)
          p.vy += 0.3;
          p.y += p.vy;
        }

      } else if (currentMode === 3 && !isExploding) {
        // 모드3: 별자리 연결선 + 호흡 확장/수축
        const breathCycle = Math.sin(modeTime * 1.2) * 0.15; // -0.15 ~ 0.15
        const breathX = (p.originX - W/2) * breathCycle + p.originX;
        const breathY = (p.originY - H/2) * breathCycle + p.originY;

        const dx = breathX - p.x;
        const dy = breathY - p.y;
        p.vx += dx * 0.03;
        p.vy += dy * 0.03;
        if (mouseX > 0 && mouseY > 0) {
          p.vx += (mouseX - W/2) / W * 0.2;
          p.vy += (mouseY - H/2) / H * 0.2;
        }
        p.vx *= 0.9; p.vy *= 0.9;
        p.x += p.vx; p.y += p.vy;

      } else {
        // 모드1 또는 폭발 중
        if (!isExploding) {
          const dx = p.targetX - p.x;
          const dy = p.targetY - p.y;
          p.vx += dx * p.ease;
          p.vy += dy * p.ease;
        }

        // 마우스 위치 기반 중력
        if (mouseX > 0 && mouseY > 0) {
          const gravX = (mouseX - W/2) / W * 0.3;
          const gravY = (mouseY - H/2) / H * 0.3;
          p.vx += gravX;
          p.vy += gravY;
        }

        p.vx *= 0.92;
        p.vy *= 0.92;
        p.x += p.vx;
        p.y += p.vy;
      }

      // 파티클 그리기
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    }

    // 모드3: 가까운 파티클끼리 연결선 + 펄스
    if (currentMode === 3) {
      const CONNECTION_DIST = 30;
      const pulse = 0.5 + Math.sin(modeTime * 3) * 1.5; // 두께 펄스 (0.5~2.0)
      const step = Math.max(1, Math.floor(particles.length / 500));
      for (let i = 0; i < particles.length; i += step) {
        for (let j = i + step; j < particles.length; j += step) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = dx*dx + dy*dy;
          if (dist < CONNECTION_DIST * CONNECTION_DIST) {
            const alpha = 1 - Math.sqrt(dist) / CONNECTION_DIST;
            ctx.strokeStyle = `rgba(255,180,0,${alpha * 0.4})`;
            ctx.lineWidth = pulse * alpha;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
          }
        }
      }
    }
  }
}
</script>
</body>
</html>
