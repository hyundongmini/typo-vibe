<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 09 - 비가 찬란히</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0a;font-family:'Pretendard',sans-serif}
canvas{position:fixed;inset:0;z-index:1;cursor:crosshair}
.back-to-archive{
  position:fixed;top:16px;left:16px;z-index:9999;
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px 8px 12px;
  background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);
  font:500 12px/1 'Pretendard',sans-serif;
  text-decoration:none;border:1px solid rgba(255,255,255,0.08);border-radius:100px;
  backdrop-filter:blur(10px);transition:background .2s,transform .2s;
}
.back-to-archive:hover{background:rgba(255,255,255,0.12);transform:translateX(-2px)}
.back-to-archive svg{flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.day-tag{position:fixed;bottom:14px;right:18px;font:11px/1 monospace;color:rgba(255,255,255,0.12);pointer-events:none;z-index:99}
.hint{position:fixed;bottom:36px;left:0;right:0;text-align:center;font:10px/1 monospace;color:rgba(255,255,255,0.15);pointer-events:none;z-index:99;letter-spacing:2px}
</style>
</head>
<body>
<a href="../" class="back-to-archive">
  <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  <span>뒤로가기</span>
</a>
<canvas id="c"></canvas>
<div class="hint">CLICK split · DRAG create · HOVER push</div>
<div class="day-tag">day 09 / typo-vibe</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,mx=-9999,my=-9999,isDrag=false,trail=[];
let bgC,bgX;
let lightX=0.3,lightY=0.3;

function createBg(){
  bgC=document.createElement('canvas');bgX=bgC.getContext('2d');
  bgC.width=W;bgC.height=H;
  bgX.fillStyle='#0a0a0a';bgX.fillRect(0,0,W,H);
  const fs=Math.min(W*0.24,H*0.2);
  bgX.font=`900 ${fs}px 'Pretendard',sans-serif`;
  bgX.textAlign='center';bgX.textBaseline='middle';
  bgX.fillStyle='rgba(255,255,255,0.55)';
  const lh=fs*1.3,sy=H/2-lh*0.5;
  bgX.fillText('비 가',W/2,sy);
  bgX.fillText('찬 란 히',W/2,sy+lh);
  bgX.font=`300 ${Math.max(10,fs*0.09)}px 'Pretendard',sans-serif`;
  bgX.fillStyle='rgba(255,255,255,0.08)';
  bgX.fillText('TYPO-VIBE DAY 09',W/2,sy+lh*2.3);
}

let blobs=[];
function mkBlob(x,y,r){
  return{ox:x,oy:y,x,y,r,vx:0,vy:0,
    phase:Math.random()*Math.PI*2,spd:0.2+Math.random()*0.4,
    ior:1.25+Math.random()*0.35,
    df:Array.from({length:10},()=>0.88+Math.random()*0.24),
    dp:Array.from({length:10},()=>Math.random()*Math.PI*2),
    ds:Array.from({length:10},()=>0.3+Math.random()*0.5)};
}
function initBlobs(){
  blobs=[];const S=Math.min(W,H);
  [[.38,.3,.15],[.62,.44,.19],[.44,.66,.13],[.28,.54,.1],[.7,.27,.08],
   [.54,.18,.065],[.24,.76,.07],[.73,.72,.095],[.5,.47,.22],
   [.14,.42,.05],[.83,.56,.055],[.6,.84,.04]].forEach(c=>
    blobs.push(mkBlob(W*c[0],H*c[1],S*c[2])));
}

/* ======= Organic path ======= */
function blobPath(b,t){
  const n=b.df.length,as=Math.PI*2/n,pts=[];
  for(let i=0;i<=n;i++){
    const idx=i%n,a=idx*as-Math.PI/2;
    const d=b.df[idx]+Math.sin(t*b.ds[idx]+b.dp[idx])*0.07;
    pts.push({x:b.x+Math.cos(a)*b.r*d,y:b.y+Math.sin(a)*b.r*d});
  }
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(let i=1;i<pts.length;i++){
    const p=pts[i-1],c=pts[i];
    ctx.quadraticCurveTo(p.x,p.y,(p.x+c.x)/2,(p.y+c.y)/2);
  }
  ctx.closePath();
  return pts;
}

/* ======= Draw blob ======= */
function drawBlob(b,t){
  const{x,y,r,ior}=b;
  ctx.save();

  // 1. Clip & draw refracted text
  const pts=blobPath(b,t);
  ctx.save();ctx.clip();
  const mag=ior,sw=r*2/mag,sh=r*2/mag;
  ctx.drawImage(bgC,Math.max(0,x-sw/2),Math.max(0,y-sh/2),
    Math.min(sw,W),Math.min(sh,H),x-r,y-r,r*2,r*2);

  // Chromatic aberration — red channel shift
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.06;
  ctx.drawImage(bgC,Math.max(0,x-sw/2-3),Math.max(0,y-sh/2),
    Math.min(sw,W),Math.min(sh,H),x-r,y-r,r*2,r*2);
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  ctx.restore();

  // 2. Edge darkening (fresnel)
  blobPath(b,t);
  const eg=ctx.createRadialGradient(x,y,r*0.4,x,y,r*1.08);
  eg.addColorStop(0,'rgba(0,0,0,0)');
  eg.addColorStop(0.6,'rgba(0,0,0,0)');
  eg.addColorStop(0.82,'rgba(0,0,0,0.25)');
  eg.addColorStop(0.92,'rgba(0,0,0,0.5)');
  eg.addColorStop(1,'rgba(0,0,0,0.7)');
  ctx.fillStyle=eg;ctx.fill();

  // 3. Inner glow (glass depth)
  blobPath(b,t);
  const ig=ctx.createRadialGradient(x-r*0.1,y-r*0.1,r*0.1,x,y,r);
  ig.addColorStop(0,'rgba(180,190,210,0.06)');
  ig.addColorStop(0.5,'rgba(120,130,150,0.03)');
  ig.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=ig;ctx.fill();

  // 4. Main specular (follows mouse/light)
  const hx=x-r*lightX,hy=y-r*lightY;
  const hg=ctx.createRadialGradient(hx,hy,0,hx,hy,r*0.5);
  hg.addColorStop(0,'rgba(255,255,255,0.95)');
  hg.addColorStop(0.15,'rgba(255,255,255,0.6)');
  hg.addColorStop(0.4,'rgba(255,255,255,0.15)');
  hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(hx,hy,r*0.5,0,Math.PI*2);
  ctx.fillStyle=hg;ctx.fill();

  // 5. Sharp specular dot
  const sg=ctx.createRadialGradient(hx+r*0.02,hy+r*0.02,0,hx+r*0.02,hy+r*0.02,r*0.12);
  sg.addColorStop(0,'rgba(255,255,255,1)');
  sg.addColorStop(0.5,'rgba(255,255,255,0.5)');
  sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();ctx.arc(hx+r*0.02,hy+r*0.02,r*0.12,0,Math.PI*2);
  ctx.fillStyle=sg;ctx.fill();

  // 6. Secondary highlight (opposite side)
  if(r>30){
    const h2x=x+r*(0.5-lightX),h2y=y+r*(0.5-lightY);
    const h2g=ctx.createRadialGradient(h2x,h2y,0,h2x,h2y,r*0.2);
    h2g.addColorStop(0,'rgba(255,255,255,0.35)');
    h2g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(h2x,h2y,r*0.2,0,Math.PI*2);
    ctx.fillStyle=h2g;ctx.fill();
  }

  // 7. Caustic (bottom light concentration)
  if(r>20){
    const cx2=x+r*0.08,cy2=y+r*0.55;
    const cg=ctx.createRadialGradient(cx2,cy2,0,cx2,cy2,r*0.3);
    cg.addColorStop(0,'rgba(255,255,255,0.2)');
    cg.addColorStop(0.5,'rgba(255,255,255,0.05)');
    cg.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(cx2,cy2,r*0.3,0,Math.PI*2);
    ctx.fillStyle=cg;ctx.fill();
  }

  // 8. Rim light (edge highlight)
  blobPath(b,t);
  ctx.strokeStyle='rgba(255,255,255,0.45)';
  ctx.lineWidth=1.5;ctx.stroke();

  // 9. Inner rim (subtle bright edge)
  blobPath(b,t);
  const rg=ctx.createRadialGradient(x,y,r*0.85,x,y,r*1.02);
  rg.addColorStop(0,'rgba(255,255,255,0)');
  rg.addColorStop(0.5,'rgba(255,255,255,0.08)');
  rg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=rg;ctx.fill();

  ctx.restore();
}

/* ======= Physics ======= */
function update(t){
  if(mx>0){lightX=0.15+(mx/W)*0.35;lightY=0.15+(my/H)*0.35}
  for(const b of blobs){
    if(b.vx){b.ox+=b.vx;b.oy+=b.vy;b.vx*=0.96;b.vy*=0.96}
    b.x=b.ox+Math.sin(t*b.spd+b.phase)*5;
    b.y=b.oy+Math.cos(t*b.spd*0.7+b.phase)*4;
    const dx=b.x-mx,dy=b.y-my,d=Math.hypot(dx,dy);
    const rr=isDrag?160:90;
    if(d<rr&&d>0){const f=(isDrag?10:3)*(1-d/rr);b.x+=dx/d*f;b.y+=dy/d*f}
  }
}

/* ======= Connections ======= */
function drawConns(){
  for(let i=0;i<blobs.length;i++)for(let j=i+1;j<blobs.length;j++){
    const a=blobs[i],b=blobs[j],d=Math.hypot(a.x-b.x,a.y-b.y),th=a.r+b.r+30;
    if(d<th){
      ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
      ctx.strokeStyle=`rgba(255,255,255,${0.03*(1-d/th)})`;
      ctx.lineWidth=Math.min(a.r,b.r)*0.1;ctx.stroke();
    }
  }
}

/* ======= Split & create ======= */
function splitAt(px,py){
  for(let i=blobs.length-1;i>=0;i--){
    const b=blobs[i];
    if(Math.hypot(b.x-px,b.y-py)<b.r&&b.r>15){
      b.r*=0.6;b.df=Array.from({length:10},()=>0.88+Math.random()*0.24);
      for(let j=0;j<2;j++){
        const a=Math.random()*Math.PI*2;
        const nb=mkBlob(b.ox+Math.cos(a)*b.r,b.oy+Math.sin(a)*b.r,b.r*0.5/0.6);
        nb.vx=Math.cos(a)*2;nb.vy=Math.sin(a)*2;blobs.push(nb);
      }
      if(blobs.length>30)blobs.splice(0,blobs.length-30);break;
    }
  }
}
function spawnTrail(){
  const step=Math.max(1,Math.floor(trail.length/5));
  for(let i=0;i<trail.length;i+=step){
    const p=trail[i];
    blobs.push(mkBlob(p.x+(Math.random()-0.5)*15,p.y+(Math.random()-0.5)*15,6+Math.random()*18));
  }
  if(blobs.length>35)blobs.splice(0,blobs.length-35);
}

/* ======= Render ======= */
function render(){
  ctx.clearRect(0,0,W,H);
  const t=performance.now()*0.001;
  update(t);
  ctx.drawImage(bgC,0,0);
  drawConns();
  [...blobs].sort((a,b)=>b.r-a.r).forEach(b=>drawBlob(b,t));

  // Bloom pass
  ctx.save();
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.1;
  ctx.filter='blur(16px)';
  for(const b of blobs){
    if(b.r<15)continue;
    const hx=b.x-b.r*lightX,hy=b.y-b.r*lightY;
    const g=ctx.createRadialGradient(hx,hy,0,hx,hy,b.r*0.4);
    g.addColorStop(0,'#fff');g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(hx,hy,b.r*0.4,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
  }
  ctx.filter='none';ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
  ctx.restore();

  requestAnimationFrame(render);
}

/* ======= Events ======= */
canvas.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;if(isDrag)trail.push({x:mx,y:my})});
canvas.addEventListener('mouseleave',()=>{mx=-9999;my=-9999});
canvas.addEventListener('mousedown',e=>{isDrag=true;trail=[];splitAt(e.clientX,e.clientY)});
window.addEventListener('mouseup',()=>{if(isDrag&&trail.length>4)spawnTrail();isDrag=false;trail=[]});
canvas.addEventListener('touchstart',e=>{e.preventDefault();const t=e.touches[0];mx=t.clientX;my=t.clientY;isDrag=true;trail=[];splitAt(mx,my)},{passive:false});
canvas.addEventListener('touchmove',e=>{const t=e.touches[0];mx=t.clientX;my=t.clientY;if(isDrag)trail.push({x:mx,y:my})},{passive:true});
canvas.addEventListener('touchend',()=>{if(isDrag&&trail.length>4)spawnTrail();isDrag=false;trail=[];mx=-9999;my=-9999});

function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight;createBg();initBlobs()}
addEventListener('resize',resize);resize();render();
</script>
</body>
</html>
