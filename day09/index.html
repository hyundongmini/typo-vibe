<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 09 - 비가 찬란히</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#080810;font-family:'Pretendard',sans-serif}
#bg-text{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:1;pointer-events:none;
}
#bg-text .line{
  font-weight:800;color:rgba(255,255,255,0.5);
  font-size:clamp(60px,14vw,160px);
  letter-spacing:-0.04em;line-height:1.1;
}
#bg-text .sub{
  font-size:clamp(10px,1.5vw,14px);font-weight:300;
  color:rgba(255,255,255,0.12);margin-top:20px;letter-spacing:4px;
}
canvas#gl{position:fixed;inset:0;z-index:2}
.back-to-archive{
  position:fixed;top:16px;left:16px;z-index:9999;
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px 8px 12px;
  background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);
  font:500 12px/1 'Pretendard',sans-serif;
  text-decoration:none;border:1px solid rgba(255,255,255,0.06);border-radius:100px;
  backdrop-filter:blur(10px);transition:background .2s,transform .2s;z-index:9999;
}
.back-to-archive:hover{background:rgba(255,255,255,0.12);transform:translateX(-2px)}
.back-to-archive svg{flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.day-tag{position:fixed;bottom:14px;right:18px;font:11px/1 monospace;color:rgba(255,255,255,0.1);pointer-events:none;z-index:99}
.hint{position:fixed;bottom:36px;left:0;right:0;text-align:center;font:10px/1 monospace;color:rgba(255,255,255,0.15);pointer-events:none;z-index:99;letter-spacing:2px}
</style>
</head>
<body>
<a href="../" class="back-to-archive">
  <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  <span>뒤로가기</span>
</a>
<div id="bg-text">
  <div class="line">비가</div>
  <div class="line">찬란히</div>
  <div class="sub">TYPO-VIBE DAY 09</div>
</div>
<canvas id="gl"></canvas>
<div class="hint">MOVE to interact</div>
<div class="day-tag">day 09 / typo-vibe</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';

/* ======= Setup ======= */
const canvas=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.2;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z=8;

/* ======= Background texture from DOM text ======= */
function captureTextTexture(){
  const c=document.createElement('canvas');
  const ctx=c.getContext('2d');
  c.width=1024;c.height=1024;
  ctx.fillStyle='#080810';
  ctx.fillRect(0,0,1024,1024);
  const fs=Math.min(c.width*0.2,180);
  ctx.font=`800 ${fs}px Pretendard,-apple-system,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fillText('비가',512,400);
  ctx.fillText('찬란히',512,600);
  ctx.font=`300 ${fs*0.1}px Pretendard,sans-serif`;
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillText('TYPO-VIBE DAY 09',512,740);
  const tex=new THREE.CanvasTexture(c);
  tex.needsUpdate=true;
  return tex;
}
const bgTexture=captureTextTexture();

/* ======= Glass/Water material (custom shader) ======= */
const waterVertexShader=`
varying vec3 vNormal;
varying vec3 vViewDir;
varying vec3 vWorldPos;
varying vec2 vUv;
uniform float uTime;

void main(){
  // Organic deformation
  vec3 pos=position;
  float n=sin(pos.x*3.0+uTime*0.8)*sin(pos.y*2.5+uTime*0.6)*sin(pos.z*2.0+uTime*0.7);
  pos+=normal*n*0.08;

  vec4 worldPos=modelMatrix*vec4(pos,1.0);
  vWorldPos=worldPos.xyz;
  vNormal=normalize(normalMatrix*normal);
  vViewDir=normalize(cameraPosition-worldPos.xyz);
  vUv=uv;
  gl_Position=projectionMatrix*viewMatrix*worldPos;
}`;

const waterFragmentShader=`
uniform sampler2D uBgTex;
uniform float uTime;
uniform vec2 uResolution;
varying vec3 vNormal;
varying vec3 vViewDir;
varying vec3 vWorldPos;
varying vec2 vUv;

void main(){
  vec3 normal=normalize(vNormal);
  vec3 viewDir=normalize(vViewDir);

  // Fresnel (edge = more reflective)
  float fresnel=pow(1.0-max(dot(normal,viewDir),0.0),3.0);
  fresnel=mix(0.05,1.0,fresnel);

  // Refraction — sample background texture with offset
  vec2 screenUV=gl_FragCoord.xy/uResolution;
  vec2 refractOffset=normal.xy*0.15;
  vec2 refractUV=screenUV+refractOffset;
  vec4 refractColor=texture2D(uBgTex,refractUV);

  // Chromatic aberration
  float rr=texture2D(uBgTex,refractUV+vec2(0.008,0.0)).r;
  float gg=texture2D(uBgTex,refractUV).g;
  float bb=texture2D(uBgTex,refractUV-vec2(0.008,0.0)).b;
  vec3 chromaticRefract=vec3(rr,gg,bb);

  // Reflection (fake environment — gradient)
  vec3 reflectDir=reflect(-viewDir,normal);
  float envY=reflectDir.y*0.5+0.5;
  vec3 envColor=mix(vec3(0.02,0.02,0.06),vec3(0.15,0.15,0.25),envY);

  // Specular highlights
  vec3 lightDir=normalize(vec3(1.0,1.5,2.0));
  vec3 halfDir=normalize(lightDir+viewDir);
  float spec=pow(max(dot(normal,halfDir),0.0),80.0);
  float spec2=pow(max(dot(normal,normalize(vec3(-0.5,1.0,1.5))),0.0),40.0)*0.3;

  // Combine
  vec3 color=mix(chromaticRefract*1.1,envColor,fresnel*0.6);
  color+=vec3(1.0)*spec*0.9;
  color+=vec3(0.8,0.85,1.0)*spec2;

  // Edge rim light
  float rim=pow(1.0-max(dot(normal,viewDir),0.0),2.0);
  color+=vec3(0.3,0.35,0.5)*rim*0.4;

  // Subtle iridescence
  float iri=sin(dot(normal,vec3(1.0,0.5,0.3))*8.0+uTime)*0.5+0.5;
  color+=vec3(0.05,0.02,0.08)*iri*fresnel*0.3;

  float alpha=mix(0.3,0.85,fresnel);
  alpha=max(alpha,spec*0.8);

  gl_FragColor=vec4(color,alpha);
}`;

const waterMaterial=new THREE.ShaderMaterial({
  vertexShader:waterVertexShader,
  fragmentShader:waterFragmentShader,
  uniforms:{
    uBgTex:{value:bgTexture},
    uTime:{value:0},
    uResolution:{value:new THREE.Vector2(window.innerWidth,window.innerHeight)},
  },
  transparent:true,
  side:THREE.FrontSide,
  depthWrite:false,
});

/* ======= Create blobs ======= */
const blobs=[];
const blobData=[
  {pos:[-1.2,-0.8,0],s:1.2},
  {pos:[1.0,0.5,0.5],s:0.9},
  {pos:[-0.3,1.2,-0.3],s:0.7},
  {pos:[0.8,-1.0,0.2],s:1.0},
  {pos:[-1.5,0.6,0.3],s:0.6},
  {pos:[1.5,-0.3,-0.2],s:0.8},
  {pos:[0.0,0.0,0.8],s:1.4},
  {pos:[-0.6,-1.5,0.1],s:0.5},
  {pos:[0.5,1.5,-0.1],s:0.55},
  {pos:[-1.8,0.0,0.4],s:0.45},
  {pos:[1.8,1.0,0.2],s:0.4},
  {pos:[0.2,-0.5,1.0],s:0.35},
];

for(const d of blobData){
  const geo=new THREE.SphereGeometry(d.s,48,48);
  const mesh=new THREE.Mesh(geo,waterMaterial.clone());
  mesh.position.set(...d.pos);
  mesh.userData={
    ox:d.pos[0],oy:d.pos[1],oz:d.pos[2],
    phase:Math.random()*Math.PI*2,
    speed:0.2+Math.random()*0.4,
  };
  scene.add(mesh);
  blobs.push(mesh);
}

/* ======= Small bubbles ======= */
const smallGeo=new THREE.SphereGeometry(1,16,16);
const smallMat=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.08});
const smalls=[];
for(let i=0;i<40;i++){
  const m=new THREE.Mesh(smallGeo,smallMat.clone());
  const s=0.02+Math.random()*0.08;
  m.scale.set(s,s,s);
  m.position.set((Math.random()-0.5)*6,(Math.random()-0.5)*5,(Math.random()-0.5)*2);
  m.userData={vy:0.002+Math.random()*0.005,phase:Math.random()*Math.PI*2};
  scene.add(m);
  smalls.push(m);
}

/* ======= Mouse ======= */
const mouse=new THREE.Vector2(-10,-10);
const raycaster=new THREE.Raycaster();

canvas.addEventListener('mousemove',(e)=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
});
canvas.addEventListener('mouseleave',()=>{mouse.x=-10;mouse.y=-10});

/* ======= Animate ======= */
function animate(){
  requestAnimationFrame(animate);
  const t=performance.now()*0.001;

  // Update blob positions (floating)
  for(const b of blobs){
    const d=b.userData;
    b.position.x=d.ox+Math.sin(t*d.speed+d.phase)*0.3;
    b.position.y=d.oy+Math.cos(t*d.speed*0.7+d.phase)*0.25;
    b.position.z=d.oz+Math.sin(t*d.speed*0.5+d.phase*2)*0.15;

    // Mouse repulsion
    raycaster.setFromCamera(mouse,camera);
    const mouseWorld=new THREE.Vector3(mouse.x,mouse.y,0).unproject(camera);
    const dir=new THREE.Vector3().subVectors(mouseWorld,camera.position).normalize();
    const planeZ=b.position.z;
    const tParam=(planeZ-camera.position.z)/dir.z;
    const mx3=camera.position.x+dir.x*tParam;
    const my3=camera.position.y+dir.y*tParam;

    const dx=b.position.x-mx3;
    const dy=b.position.y-my3;
    const dist=Math.hypot(dx,dy);
    if(dist<2&&dist>0){
      const force=0.8*(1-dist/2);
      b.position.x+=dx/dist*force;
      b.position.y+=dy/dist*force;
    }

    // Update shader time
    b.material.uniforms.uTime.value=t;
  }

  // Small bubbles rise
  for(const s of smalls){
    s.position.y+=s.userData.vy;
    s.position.x+=Math.sin(t*2+s.userData.phase)*0.001;
    if(s.position.y>3){s.position.y=-3;s.position.x=(Math.random()-0.5)*6}
  }

  renderer.render(scene,camera);
}

/* ======= Resize ======= */
function onResize(){
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  for(const b of blobs){
    b.material.uniforms.uResolution.value.set(w*renderer.getPixelRatio(),h*renderer.getPixelRatio());
  }
}
window.addEventListener('resize',onResize);
onResize();
animate();
</script>
</body>
</html>
