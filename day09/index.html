<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 09 - 비가 찬란히</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0a;font-family:'Pretendard',sans-serif}
canvas{position:fixed;inset:0;z-index:1;cursor:crosshair}
.back-to-archive{
  position:fixed;top:16px;left:16px;z-index:9999;
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px 8px 12px;
  background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);
  font:500 12px/1 'Pretendard',sans-serif;
  text-decoration:none;border:1px solid rgba(255,255,255,0.08);border-radius:100px;
  backdrop-filter:blur(10px);transition:background .2s,transform .2s;
}
.back-to-archive:hover{background:rgba(255,255,255,0.12);transform:translateX(-2px)}
.back-to-archive svg{flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.day-tag{position:fixed;bottom:14px;right:18px;font:11px/1 monospace;color:rgba(255,255,255,0.12);pointer-events:none;z-index:99}
.hint{position:fixed;bottom:36px;left:0;right:0;text-align:center;font:10px/1 monospace;color:rgba(255,255,255,0.15);pointer-events:none;z-index:99;letter-spacing:2px}
</style>
</head>
<body>
<a href="../" class="back-to-archive">
  <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  <span>뒤로가기</span>
</a>
<canvas id="c"></canvas>
<div class="hint">CLICK to split · DRAG to create · SCROLL to zoom</div>
<div class="day-tag">day 09 / typo-vibe</div>

<script>
/* ================================================================
   day 09 — "비가 찬란히"
   밝은 배경 + 텍스트 위에 유리 물방울.
   물방울 안에서 텍스트가 렌즈처럼 확대/왜곡됨.
   Canvas 2D — 배경 텍스처 굴절 기반.
   ================================================================ */

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
let mx=-9999,my=-9999,isDragging=false,dragTrail=[];

/* ======= Background text texture ======= */
let bgCanvas,bgCtx;
function createBgTexture(){
  bgCanvas=document.createElement('canvas');
  bgCtx=bgCanvas.getContext('2d');
  bgCanvas.width=W;bgCanvas.height=H;

  bgCtx.fillStyle='#0a0a0a';
  bgCtx.fillRect(0,0,W,H);

  const fs=Math.min(W*0.22,H*0.18);
  bgCtx.font=`900 ${fs}px 'Pretendard',-apple-system,sans-serif`;
  bgCtx.textAlign='center';
  bgCtx.textBaseline='middle';
  bgCtx.letterSpacing='0.08em';

  // Main text
  bgCtx.fillStyle='rgba(255,255,255,0.5)';
  const lines=['비 가','찬 란 히'];
  const lineH=fs*1.25;
  const startY=H/2-lineH*0.5;
  lines.forEach((line,i)=>{
    bgCtx.fillText(line,W/2,startY+i*lineH);
  });

  // Sub
  bgCtx.font=`300 ${Math.max(10,fs*0.08)}px 'Pretendard',sans-serif`;
  bgCtx.fillStyle='rgba(255,255,255,0.1)';
  bgCtx.fillText('TYPO-VIBE DAY 09',W/2,startY+lineH*2.2);
}

/* ======= Blobs ======= */
let blobs=[];
function initBlobs(){
  blobs=[];
  const configs=[
    {x:W*0.38,y:H*0.32,r:Math.min(W,H)*0.14},
    {x:W*0.62,y:H*0.45,r:Math.min(W,H)*0.18},
    {x:W*0.45,y:H*0.65,r:Math.min(W,H)*0.12},
    {x:W*0.3,y:H*0.55,r:Math.min(W,H)*0.1},
    {x:W*0.7,y:H*0.28,r:Math.min(W,H)*0.08},
    {x:W*0.55,y:H*0.2,r:Math.min(W,H)*0.06},
    {x:W*0.25,y:H*0.75,r:Math.min(W,H)*0.07},
    {x:W*0.72,y:H*0.7,r:Math.min(W,H)*0.09},
    {x:W*0.5,y:H*0.48,r:Math.min(W,H)*0.2},
    {x:W*0.15,y:H*0.4,r:Math.min(W,H)*0.05},
    {x:W*0.82,y:H*0.55,r:Math.min(W,H)*0.055},
    {x:W*0.6,y:H*0.82,r:Math.min(W,H)*0.04},
  ];
  for(const c of configs){
    blobs.push(makeBlob(c.x,c.y,c.r));
  }
}

function makeBlob(x,y,r){
  return {
    ox:x,oy:y,x,y,r,
    vx:0,vy:0,
    phase:Math.random()*Math.PI*2,
    speed:0.2+Math.random()*0.4,
    ior:1.3+Math.random()*0.3, // refraction strength
    // organic shape deformation
    deform:Array.from({length:12},()=>0.9+Math.random()*0.2),
    deformPhase:Array.from({length:12},()=>Math.random()*Math.PI*2),
    deformSpeed:Array.from({length:12},()=>0.3+Math.random()*0.6),
  };
}

/* ======= Draw a single glass blob ======= */
function drawBlob(b,t){
  const {x,y,r,ior}=b;

  ctx.save();

  // Build organic clip path
  const pts=b.deform.length;
  const angleStep=Math.PI*2/pts;
  ctx.beginPath();
  const pathPoints=[];
  for(let i=0;i<=pts;i++){
    const idx=i%pts;
    const angle=idx*angleStep-Math.PI/2;
    const d=b.deform[idx]+Math.sin(t*b.deformSpeed[idx]+b.deformPhase[idx])*0.06;
    const px=x+Math.cos(angle)*r*d;
    const py=y+Math.sin(angle)*r*d;
    pathPoints.push({x:px,y:py});
  }
  // Smooth curve through points
  ctx.moveTo(pathPoints[0].x,pathPoints[0].y);
  for(let i=1;i<pathPoints.length;i++){
    const prev=pathPoints[i-1];
    const curr=pathPoints[i];
    const cpx=(prev.x+curr.x)/2;
    const cpy=(prev.y+curr.y)/2;
    ctx.quadraticCurveTo(prev.x,prev.y,cpx,cpy);
  }
  ctx.closePath();
  ctx.save();
  ctx.clip();

  // === REFRACTION: draw magnified/shifted background inside blob ===
  const mag=ior; // magnification factor
  const srcW=r*2/mag;
  const srcH=r*2/mag;
  const srcX=x-srcW/2;
  const srcY=y-srcH/2;

  // Draw refracted background (magnified = lens effect)
  ctx.drawImage(bgCanvas,
    Math.max(0,srcX),Math.max(0,srcY),
    Math.min(srcW,W-srcX),Math.min(srcH,H-srcY),
    x-r,y-r,r*2,r*2
  );

  // Slight tint overlay
  ctx.fillStyle='rgba(10,10,15,0.06)';
  ctx.fillRect(x-r,y-r,r*2,r*2);

  ctx.restore(); // unclip

  // === EDGE: dark rim (refraction edge darkening) ===
  ctx.beginPath();
  ctx.moveTo(pathPoints[0].x,pathPoints[0].y);
  for(let i=1;i<pathPoints.length;i++){
    const prev=pathPoints[i-1],curr=pathPoints[i];
    ctx.quadraticCurveTo(prev.x,prev.y,(prev.x+curr.x)/2,(prev.y+curr.y)/2);
  }
  ctx.closePath();
  const edgeGrad=ctx.createRadialGradient(x,y,r*0.6,x,y,r*1.05);
  edgeGrad.addColorStop(0,'rgba(0,0,0,0)');
  edgeGrad.addColorStop(0.7,'rgba(0,0,0,0)');
  edgeGrad.addColorStop(0.88,'rgba(0,0,0,0.15)');
  edgeGrad.addColorStop(1,'rgba(0,0,0,0.35)');
  ctx.fillStyle=edgeGrad;
  ctx.fill();

  // === HIGHLIGHT: specular follows light direction ===
  const hlX=x-r*lightX,hlY=y-r*lightY;
  const hlGrad=ctx.createRadialGradient(hlX,hlY,0,hlX,hlY,r*0.45);
  hlGrad.addColorStop(0,'rgba(255,255,255,0.85)');
  hlGrad.addColorStop(0.3,'rgba(255,255,255,0.3)');
  hlGrad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(hlX,hlY,r*0.45,0,Math.PI*2);
  ctx.fillStyle=hlGrad;
  ctx.fill();

  // === SECONDARY HIGHLIGHT: bottom-right ===
  if(r>30){
    const hl2X=x+r*0.2,hl2Y=y+r*0.25;
    const hl2Grad=ctx.createRadialGradient(hl2X,hl2Y,0,hl2X,hl2Y,r*0.2);
    hl2Grad.addColorStop(0,'rgba(255,255,255,0.4)');
    hl2Grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(hl2X,hl2Y,r*0.2,0,Math.PI*2);
    ctx.fillStyle=hl2Grad;
    ctx.fill();
  }

  // === OUTLINE: thin bright edge ===
  ctx.beginPath();
  ctx.moveTo(pathPoints[0].x,pathPoints[0].y);
  for(let i=1;i<pathPoints.length;i++){
    const prev=pathPoints[i-1],curr=pathPoints[i];
    ctx.quadraticCurveTo(prev.x,prev.y,(prev.x+curr.x)/2,(prev.y+curr.y)/2);
  }
  ctx.closePath();
  ctx.strokeStyle='rgba(255,255,255,0.5)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // === CAUSTIC: bright spot at bottom ===
  if(r>25){
    const caustX=x+r*0.05,caustY=y+r*0.6;
    const caustGrad=ctx.createRadialGradient(caustX,caustY,0,caustX,caustY,r*0.3);
    caustGrad.addColorStop(0,'rgba(255,255,255,0.2)');
    caustGrad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(caustX,caustY,r*0.3,0,Math.PI*2);
    ctx.fillStyle=caustGrad;
    ctx.fill();
  }

  // === SHADOW on background ===
  ctx.beginPath();
  ctx.ellipse(x+r*0.1,y+r*1.05,r*0.7,r*0.08,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,0.03)';
  ctx.fill();

  ctx.restore();
}

/* ======= Connection lines ======= */
function drawConnections(){
  for(let i=0;i<blobs.length;i++){
    for(let j=i+1;j<blobs.length;j++){
      const a=blobs[i],b=blobs[j];
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      const threshold=a.r+b.r+40;
      if(d<threshold){
        const alpha=0.04*(1-d/threshold);
        ctx.beginPath();
        ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle=`rgba(255,255,255,${alpha})`;
        ctx.lineWidth=Math.min(a.r,b.r)*0.15;
        ctx.stroke();
      }
    }
  }
}

/* ======= Physics ======= */
function update(t){
  for(const b of blobs){
    b.x=b.ox+Math.sin(t*b.speed+b.phase)*6;
    b.y=b.oy+Math.cos(t*b.speed*0.7+b.phase)*5;

    // Split velocity decay
    if(b.vx){b.ox+=b.vx;b.oy+=b.vy;b.vx*=0.96;b.vy*=0.96}

    // Mouse repulsion
    const dx=b.x-mx,dy=b.y-my;
    const dist=Math.hypot(dx,dy);
    const repelR=isDragging?180:100;
    if(dist<repelR&&dist>0){
      const force=(isDragging?12:4)*(1-dist/repelR);
      b.x+=dx/dist*force;
      b.y+=dy/dist*force;
    }
  }
}

/* ======= Split ======= */
function splitAt(px,py){
  for(let i=blobs.length-1;i>=0;i--){
    const b=blobs[i];
    if(Math.hypot(b.x-px,b.y-py)<b.r&&b.r>20){
      const newR=b.r*0.55;
      b.r=b.r*0.6;
      b.deform=Array.from({length:12},()=>0.9+Math.random()*0.2);
      for(let j=0;j<2;j++){
        const angle=Math.random()*Math.PI*2;
        const nb=makeBlob(b.ox+Math.cos(angle)*b.r,b.oy+Math.sin(angle)*b.r,newR);
        nb.vx=Math.cos(angle)*2;nb.vy=Math.sin(angle)*2;
        blobs.push(nb);
      }
      if(blobs.length>35){blobs.splice(0,blobs.length-35)}
      break;
    }
  }
}

/* ======= Drag create ======= */
function spawnFromTrail(){
  const step=Math.max(1,Math.floor(dragTrail.length/6));
  for(let i=0;i<dragTrail.length;i+=step){
    const p=dragTrail[i];
    const r=8+Math.random()*20;
    const nb=makeBlob(p.x+(Math.random()-0.5)*20,p.y+(Math.random()-0.5)*20,r);
    blobs.push(nb);
  }
  if(blobs.length>40)blobs.splice(0,blobs.length-40);
}

/* ======= Render ======= */
let lightX=0.3,lightY=0.35; // normalized light direction

function render(){
  ctx.clearRect(0,0,W,H);
  const t=performance.now()*0.001;

  // Update light position based on mouse
  if(mx>0){
    lightX=0.15+(mx/W)*0.3; // 0.15~0.45
    lightY=0.15+(my/H)*0.3;
  }

  update(t);

  // Draw background
  ctx.drawImage(bgCanvas,0,0);

  // Draw connections
  drawConnections();

  // Sort blobs by size (big behind small)
  const sorted=[...blobs].sort((a,b)=>b.r-a.r);
  for(const b of sorted){
    drawBlob(b,t);
  }

  // Bloom glow pass — draw bright spots again with blur
  ctx.save();
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=0.15;
  ctx.filter='blur(20px)';
  for(const b of sorted){
    if(b.r<20)continue;
    const hlX=b.x-b.r*lightX,hlY=b.y-b.r*lightY;
    const grad=ctx.createRadialGradient(hlX,hlY,0,hlX,hlY,b.r*0.6);
    grad.addColorStop(0,'rgba(255,255,255,0.8)');
    grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();ctx.arc(hlX,hlY,b.r*0.6,0,Math.PI*2);
    ctx.fillStyle=grad;ctx.fill();
  }
  ctx.filter='none';
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
  ctx.restore();

  requestAnimationFrame(render);
}

/* ======= Events ======= */
canvas.addEventListener('mousemove',(e)=>{mx=e.clientX;my=e.clientY;
  if(isDragging)dragTrail.push({x:mx,y:my})});
canvas.addEventListener('mouseleave',()=>{mx=-9999;my=-9999});
canvas.addEventListener('mousedown',(e)=>{isDragging=true;dragTrail=[];splitAt(e.clientX,e.clientY)});
window.addEventListener('mouseup',()=>{
  if(isDragging&&dragTrail.length>5)spawnFromTrail();
  isDragging=false;dragTrail=[];
});
canvas.addEventListener('touchstart',(e)=>{
  e.preventDefault();const t=e.touches[0];mx=t.clientX;my=t.clientY;
  isDragging=true;dragTrail=[];splitAt(mx,my);
},{passive:false});
canvas.addEventListener('touchmove',(e)=>{
  const t=e.touches[0];mx=t.clientX;my=t.clientY;
  if(isDragging)dragTrail.push({x:mx,y:my});
},{passive:true});
canvas.addEventListener('touchend',()=>{
  if(isDragging&&dragTrail.length>5)spawnFromTrail();
  isDragging=false;dragTrail=[];mx=-9999;my=-9999;
});

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  createBgTexture();
  initBlobs();
}
window.addEventListener('resize',resize);
resize();
render();
</script>
</body>
</html>
