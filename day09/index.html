<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 09 - 비가 찬란히</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#000;font-family:'Pretendard',sans-serif}
.yt-bg{
  position:fixed;inset:0;z-index:0;overflow:hidden;
}
.yt-bg iframe{
  position:absolute;top:50%;left:50%;
  width:180vw;height:180vh;min-width:180vw;min-height:180vh;
  transform:translate(-50%,-50%);
  border:none;pointer-events:none;
}
canvas{position:fixed;inset:0;z-index:1}
.back-to-archive{
  position:fixed;top:16px;left:16px;z-index:9999;
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px 8px 12px;
  background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);
  font:500 12px/1 'Pretendard',sans-serif;
  text-decoration:none;border:1px solid rgba(255,255,255,0.08);border-radius:100px;
  backdrop-filter:blur(10px);transition:background .2s,transform .2s;
}
.back-to-archive:hover{background:rgba(255,255,255,0.12);transform:translateX(-2px)}
.back-to-archive svg{flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.day-tag{position:fixed;bottom:14px;right:18px;font:11px/1 monospace;color:rgba(255,255,255,0.12);pointer-events:none;z-index:99}
.hint{position:fixed;bottom:36px;left:0;right:0;text-align:center;font:10px/1 monospace;color:rgba(255,255,255,0.15);pointer-events:none;z-index:99;letter-spacing:2px}
</style>
</head>
<body>
<div class="yt-bg">
  <iframe src="https://www.youtube.com/embed/C47K1TX9PAA?autoplay=1&mute=1&loop=1&playlist=C47K1TX9PAA&controls=0&showinfo=0&modestbranding=1&rel=0&disablekb=1&iv_load_policy=3&playsinline=1" allow="autoplay" allowfullscreen></iframe>
</div>
<a href="../" class="back-to-archive">
  <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  <span>뒤로가기</span>
</a>
<canvas id="c"></canvas>
<div class="hint">HOVER to interact · CLICK to split</div>
<div class="day-tag">day 09 / typo-vibe</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {RGBELoader} from 'three/addons/loaders/RGBELoader.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.3;
renderer.setSize(innerWidth,innerHeight);
renderer.setClearColor(0x080810,0.4); // 40% — video clearly visible

const scene=new THREE.Scene();
// No scene.background — let alpha show through to video
const camera=new THREE.PerspectiveCamera(35,innerWidth/innerHeight,0.1,100);
camera.position.z=10;

/* Post-processing */
const rtOpts={format:THREE.RGBAFormat,stencilBuffer:false};
const compRT=new THREE.WebGLRenderTarget(innerWidth,innerHeight,rtOpts);
const composer=new EffectComposer(renderer,compRT);
const rPass=new RenderPass(scene,camera);
rPass.clearAlpha=0;
composer.addPass(rPass);
composer.addPass(new UnrealBloomPass(new THREE.Vector2(innerWidth,innerHeight),0.4,0.3,0.9));

/* ======= Text plane INSIDE the 3D scene (behind blobs) ======= */
function makeTextTexture(){
  const c=document.createElement('canvas');
  const x=c.getContext('2d');
  c.width=2048;c.height=2048;
  x.fillStyle='#080810';x.fillRect(0,0,2048,2048);
  const fs=320;
  x.font=`900 ${fs}px 'Pretendard',sans-serif`;
  x.textAlign='center';x.textBaseline='middle';
  x.fillStyle='#ffffff';
  x.fillText('비 가',1024,780);
  x.fillText('찬 란 히',1024,1180);
  x.font=`300 28px 'Pretendard',sans-serif`;
  x.fillStyle='rgba(255,255,255,0.25)';
  x.fillText('TYPO-VIBE DAY 09',1024,1450);
  const tex=new THREE.CanvasTexture(c);
  tex.needsUpdate=true;
  return tex;
}

const textTex=makeTextTexture();
const textPlane=new THREE.Mesh(
  new THREE.PlaneGeometry(14,14),
  new THREE.MeshBasicMaterial({map:textTex,transparent:false})
);
textPlane.position.z=-3; // behind the blobs
scene.add(textPlane);

/* ======= HDRI environment ======= */
const pmrem=new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
new RGBELoader().load('env.hdr',(tex)=>{
  const envMap=pmrem.fromEquirectangular(tex).texture;
  scene.environment=envMap;
  tex.dispose();pmrem.dispose();
});

/* ======= Lights ======= */
const dLight=new THREE.DirectionalLight(0xffffff,2);
dLight.position.set(3,4,5);scene.add(dLight);
const dLight2=new THREE.DirectionalLight(0x8899cc,1);
dLight2.position.set(-3,2,4);scene.add(dLight2);
const pLight=new THREE.PointLight(0xffffff,1.5,20);
pLight.position.set(0,0,5);scene.add(pLight);
scene.add(new THREE.AmbientLight(0x111122,0.3));

/* ======= Glass material — PBR transmission + IOR ======= */
function glassMat(){
  return new THREE.MeshPhysicalMaterial({
    color:0xffffff,
    metalness:0,
    roughness:0.05,
    transmission:1.0,       // fully transmissive
    thickness:2.0,          // refraction strength
    ior:1.45,               // glass-like
    envMapIntensity:1.8,
    clearcoat:1.0,
    clearcoatRoughness:0.0,
    transparent:true,
    side:THREE.FrontSide,
    attenuationColor:new THREE.Color(0.92,0.93,1.0),
    attenuationDistance:3.0,
    specularIntensity:1.0,
    specularColor:new THREE.Color(1,1,1),
  });
}

/* ======= Create glass blobs ======= */
const blobs=[];
const blobCfg=[
  [-1.5,-1.0,0,1.3],[ 1.3, 0.5,0.3,1.0],[-0.4, 1.4,-0.2,0.8],
  [ 0.9,-1.3,0.1,1.1],[-1.8, 0.5,0.2,0.65],[ 1.7,-0.4,-0.1,0.85],
  [ 0.0, 0.1,0.5,1.6],[-0.7,-1.8,0,0.55],[ 0.6, 1.7,-0.1,0.6],
  [-2.1, 0.0,0.3,0.5],[ 2.1, 1.2,0.1,0.45],[ 0.3,-0.6,0.7,0.4],
];

for(const[px,py,pz,s] of blobCfg){
  const geo=new THREE.SphereGeometry(s,64,64);
  // Organic deformation
  const pa=geo.attributes.position;
  const seed=Math.random()*100;
  for(let i=0;i<pa.count;i++){
    const x=pa.getX(i),y=pa.getY(i),z=pa.getZ(i);
    const n=Math.sin(x*3+seed)*Math.sin(y*2.5+seed*0.7)*Math.sin(z*2+seed*1.3);
    pa.setXYZ(i,x*(1+n*0.12),y*(1+n*0.12),z*(1+n*0.12));
  }
  geo.computeVertexNormals();

  const mat=glassMat();
  mat.ior=1.3+Math.random()*0.3;
  mat.thickness=1.0+Math.random()*2.5;

  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(px,py,pz);
  mesh.userData={
    ox:px,oy:py,oz:pz,
    phase:Math.random()*Math.PI*2,
    speed:0.15+Math.random()*0.35,
    rotSpd:new THREE.Vector3((Math.random()-0.5)*0.08,(Math.random()-0.5)*0.08,0),
  };
  scene.add(mesh);
  blobs.push(mesh);
}

/* Small bubbles */
for(let i=0;i<30;i++){
  const s=0.05+Math.random()*0.15;
  const geo=new THREE.SphereGeometry(s,16,16);
  const mat=glassMat();
  mat.thickness=0.3;mat.ior=1.3;
  const m=new THREE.Mesh(geo,mat);
  m.position.set((Math.random()-0.5)*8,(Math.random()-0.5)*6,(Math.random()-0.5)*2);
  m.userData={
    ox:m.position.x,oy:m.position.y,oz:m.position.z,
    phase:Math.random()*Math.PI*2,speed:0.3+Math.random()*0.5,
    rotSpd:new THREE.Vector3(0,0,0),small:true,
  };
  scene.add(m);
  blobs.push(m);
}

/* ======= Mouse ======= */
const mouse=new THREE.Vector2(-10,-10);
const raycaster=new THREE.Raycaster();

canvas.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
});
canvas.addEventListener('mouseleave',()=>{mouse.x=-10;mouse.y=-10});
canvas.addEventListener('mousedown',e=>{
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(blobs.filter(b=>!b.userData.small));
  if(hits.length>0)splitBlob(hits[0].object);
});

function splitBlob(mesh){
  const pos=mesh.position.clone();
  const s=mesh.scale.x;
  if(s<0.2)return;
  mesh.scale.multiplyScalar(0.6);
  for(let i=0;i<2;i++){
    const angle=Math.random()*Math.PI*2;
    const childS=s*0.45;
    const geo=new THREE.SphereGeometry(1,32,32);
    const mat=glassMat();
    mat.ior=1.3+Math.random()*0.3;
    mat.thickness=1+Math.random()*2;
    const child=new THREE.Mesh(geo,mat);
    child.scale.set(childS,childS,childS);
    child.position.copy(pos).add(new THREE.Vector3(Math.cos(angle)*0.8,Math.sin(angle)*0.8,0));
    child.userData={
      ox:child.position.x,oy:child.position.y,oz:child.position.z,
      phase:Math.random()*Math.PI*2,speed:0.2+Math.random()*0.4,
      rotSpd:new THREE.Vector3((Math.random()-0.5)*0.1,(Math.random()-0.5)*0.1,0),
      vx:Math.cos(angle)*0.02,vy:Math.sin(angle)*0.02,
    };
    scene.add(child);
    blobs.push(child);
  }
  while(blobs.length>50){
    const old=blobs.shift();scene.remove(old);old.geometry.dispose();old.material.dispose();
  }
}

/* ======= Animate ======= */
function animate(){
  requestAnimationFrame(animate);
  const t=performance.now()*0.001;

  for(const m of blobs){
    const d=m.userData;
    if(d.vx){d.ox+=d.vx;d.oy+=d.vy;d.vx*=0.98;d.vy*=0.98}
    m.position.x=d.ox+Math.sin(t*d.speed+d.phase)*0.3;
    m.position.y=d.oy+Math.cos(t*d.speed*0.7+d.phase)*0.25;
    m.position.z=(d.oz||0)+Math.sin(t*d.speed*0.4+d.phase*2)*0.1;
    m.rotation.x+=d.rotSpd.x*0.01;
    m.rotation.y+=d.rotSpd.y*0.01;

    // Surface ripple
    if(!d.small){
      const pa=m.geometry.attributes.position;
      if(!d.origV)d.origV=pa.array.slice();
      for(let i=0;i<pa.count;i++){
        const ox=d.origV[i*3],oy=d.origV[i*3+1],oz=d.origV[i*3+2];
        const w=Math.sin(ox*4+t*1.5)*Math.sin(oy*3+t*1.2)*Math.cos(oz*2+t*0.8)*0.03;
        pa.setXYZ(i,ox*(1+w),oy*(1+w),oz*(1+w));
      }
      pa.needsUpdate=true;
      m.geometry.computeVertexNormals();
    }

    // Mouse repulsion
    if(mouse.x>-5){
      const mw=new THREE.Vector3(mouse.x,mouse.y,0.5).unproject(camera);
      const dir=mw.sub(camera.position).normalize();
      const tp=(m.position.z-camera.position.z)/dir.z;
      const mx3=camera.position.x+dir.x*tp;
      const my3=camera.position.y+dir.y*tp;
      const dx=m.position.x-mx3,dy=m.position.y-my3;
      const dist=Math.hypot(dx,dy);
      if(dist<2.5&&dist>0){
        const f=0.8*(1-dist/2.5);
        m.position.x+=dx/dist*f;
        m.position.y+=dy/dist*f;
      }
    }
  }

  // Mouse-following light
  if(mouse.x>-5){
    pLight.position.x=mouse.x*4;
    pLight.position.y=mouse.y*3;
  }

  // Camera sway
  camera.position.x=Math.sin(t*0.08)*0.12;
  camera.position.y=Math.cos(t*0.06)*0.08;
  camera.lookAt(0,0,0);

  composer.render();
}

function onResize(){
  const w=innerWidth,h=innerHeight;
  camera.aspect=w/h;camera.updateProjectionMatrix();
  renderer.setSize(w,h);composer.setSize(w,h);
}
addEventListener('resize',onResize);
animate();
</script>
</body>
</html>
