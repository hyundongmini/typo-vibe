<!DOCTYPE html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 09 - 비가 찬란히</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#080810;font-family:'Pretendard',sans-serif}
#bg-text{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:3;pointer-events:none;
}
#bg-text .line{
  font-weight:700;color:rgba(255,255,255,0.5);
  font-size:clamp(60px,14vw,160px);
  letter-spacing:0.08em;line-height:1.15;
}
#bg-text .sub{
  font-size:clamp(10px,1.5vw,14px);font-weight:300;

}
canvas#gl{position:fixed;inset:0;z-index:2}
.back-to-archive{
  position:fixed;top:16px;left:16px;z-index:9999;
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px 8px 12px;
  background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.5);
  font:500 12px/1 'Pretendard',sans-serif;
  text-decoration:none;border:1px solid rgba(255,255,255,0.06);border-radius:100px;
  backdrop-filter:blur(10px);transition:background .2s,transform .2s;
}
.back-to-archive:hover{background:rgba(255,255,255,0.12);transform:translateX(-2px)}
.back-to-archive svg{flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.day-tag{position:fixed;bottom:14px;right:18px;font:11px/1 monospace;color:rgba(255,255,255,0.1);pointer-events:none;z-index:99}
.hint{position:fixed;bottom:36px;left:0;right:0;text-align:center;font:10px/1 monospace;color:rgba(255,255,255,0.15);pointer-events:none;z-index:99;letter-spacing:2px}
</style>
</head>
<body>
<a href="../" class="back-to-archive">
  <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  <span>뒤로가기</span>
</a>
<div id="bg-text">
  <div class="line">비가</div>
  <div class="line">찬란히</div>
  <div class="sub">TYPO-VIBE DAY 09</div>
</div>
<canvas id="gl"></canvas>
<div class="hint">MOVE to interact</div>
<div class="day-tag">day 09 / typo-vibe</div>

<script type="importmap">
{"imports":{
  "three":"https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
  "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import {RGBELoader} from 'three/addons/loaders/RGBELoader.js';
import {EffectComposer} from 'three/addons/postprocessing/EffectComposer.js';
import {RenderPass} from 'three/addons/postprocessing/RenderPass.js';
import {UnrealBloomPass} from 'three/addons/postprocessing/UnrealBloomPass.js';

/* ======= Renderer ======= */
const canvas=document.getElementById('gl');
const renderer=new THREE.WebGLRenderer({canvas,alpha:true,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.4;

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(40,window.innerWidth/window.innerHeight,0.1,100);
camera.position.z=9;

/* ======= Post-processing (Bloom) ======= */
const composer=new EffectComposer(renderer);
composer.addPass(new RenderPass(scene,camera));
const bloom=new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth,window.innerHeight),
  0.6,  // strength
  0.4,  // radius
  0.85  // threshold
);
composer.addPass(bloom);

/* ======= HDRI Environment ======= */
const pmremGenerator=new THREE.PMREMGenerator(renderer);
pmremGenerator.compileEquirectangularShader();

new RGBELoader().load('env.hdr',(hdrTexture)=>{
  const envMap=pmremGenerator.fromEquirectangular(hdrTexture).texture;
  scene.environment=envMap;
  hdrTexture.dispose();
  pmremGenerator.dispose();

  // Update all glass materials with envMap
  for(const b of blobs){
    b.material.envMap=envMap;
    b.material.needsUpdate=true;
  }
});

/* ======= Glass Material (MeshPhysicalMaterial) ======= */
function createGlassMat(){
  return new THREE.MeshPhysicalMaterial({
    color:0xffffff,
    metalness:0.0,
    roughness:0.01,
    transmission:0.99,
    thickness:0.3,
    ior:1.35,
    envMapIntensity:2.0,
    clearcoat:1.0,
    clearcoatRoughness:0.0,
    transparent:true,
    opacity:0.18,
    side:THREE.DoubleSide,
    depthWrite:false,
    attenuationColor:new THREE.Color(0.95,0.95,1.0),
    attenuationDistance:2.0,
    specularIntensity:1.0,
    specularColor:new THREE.Color(1,1,1),
  });
}

/* ======= Lights ======= */
const dirLight=new THREE.DirectionalLight(0xffffff,3);
dirLight.position.set(3,5,5);
scene.add(dirLight);

const dirLight2=new THREE.DirectionalLight(0x8888ff,1.5);
dirLight2.position.set(-4,2,3);
scene.add(dirLight2);

const pointLight=new THREE.PointLight(0xffffff,2,20);
pointLight.position.set(0,0,4);
scene.add(pointLight);

const ambientLight=new THREE.AmbientLight(0x111122,0.5);
scene.add(ambientLight);

/* ======= Create blobs ======= */
const blobs=[];
const blobData=[
  {pos:[-1.4,-1.0,0],s:1.3},
  {pos:[1.2,0.6,0.3],s:1.0},
  {pos:[-0.4,1.3,-0.2],s:0.8},
  {pos:[0.9,-1.2,0.1],s:1.1},
  {pos:[-1.7,0.5,0.2],s:0.65},
  {pos:[1.6,-0.4,-0.1],s:0.85},
  {pos:[0.0,0.1,0.6],s:1.5},
  {pos:[-0.7,-1.7,0.0],s:0.55},
  {pos:[0.6,1.6,-0.1],s:0.6},
  {pos:[-2.0,0.0,0.3],s:0.5},
  {pos:[2.0,1.2,0.1],s:0.45},
  {pos:[0.3,-0.6,0.8],s:0.4},
  {pos:[-0.2,0.8,1.0],s:0.35},
  {pos:[1.5,-1.5,0.4],s:0.3},
];

for(const d of blobData){
  const geo=new THREE.SphereGeometry(d.s,64,64);
  // Organic deformation baked into geometry
  const posAttr=geo.attributes.position;
  const seed=Math.random()*100;
  for(let i=0;i<posAttr.count;i++){
    const x=posAttr.getX(i),y=posAttr.getY(i),z=posAttr.getZ(i);
    const n=Math.sin(x*3+seed)*Math.sin(y*2.5+seed*0.7)*Math.sin(z*2+seed*1.3);
    const factor=1+n*0.12;
    posAttr.setXYZ(i,x*factor,y*factor,z*factor);
  }
  geo.computeVertexNormals();

  const mat=createGlassMat();
  // Vary IOR slightly per blob
  mat.ior=1.2+Math.random()*0.25;
  mat.thickness=0.15+Math.random()*0.4;

  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.set(...d.pos);
  mesh.userData={
    ox:d.pos[0],oy:d.pos[1],oz:d.pos[2],
    phase:Math.random()*Math.PI*2,
    speed:0.15+Math.random()*0.35,
    rotSpeed:new THREE.Vector3(
      (Math.random()-0.5)*0.1,
      (Math.random()-0.5)*0.1,
      (Math.random()-0.5)*0.05
    ),
  };
  scene.add(mesh);
  blobs.push(mesh);
}

/* ======= Small bubbles ======= */
const smallGeo=new THREE.SphereGeometry(1,12,12);
const smalls=[];
for(let i=0;i<50;i++){
  const mat=createGlassMat();
  mat.transmission=0.98;mat.thickness=0.1;mat.opacity=0.12;
  const m=new THREE.Mesh(smallGeo,mat);
  const s=0.03+Math.random()*0.1;
  m.scale.set(s,s,s);
  m.position.set((Math.random()-0.5)*7,(Math.random()-0.5)*6,(Math.random()-0.5)*3);
  m.userData={vy:0.003+Math.random()*0.008,phase:Math.random()*Math.PI*2};
  scene.add(m);
  smalls.push(m);
}

/* ======= Mouse ======= */
const mouse=new THREE.Vector2(-10,-10);
canvas.addEventListener('mousemove',(e)=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
});
canvas.addEventListener('mouseleave',()=>{mouse.x=-10;mouse.y=-10});

/* ======= Animate ======= */
function animate(){
  requestAnimationFrame(animate);
  const t=performance.now()*0.001;

  for(const b of blobs){
    const d=b.userData;
    // Floating upward slowly + gentle sway
    d.oy-=0.003; // 천천히 위로
    if(d.oy<-4){d.oy=4;d.ox=(Math.random()-0.5)*4} // 위로 나가면 아래서 재등장

    b.position.x=d.ox+Math.sin(t*d.speed+d.phase)*0.35;
    b.position.y=d.oy+Math.cos(t*d.speed*0.7+d.phase)*0.3;
    b.position.z=d.oz+Math.sin(t*d.speed*0.4+d.phase*2)*0.15;

    // Slow rotation
    b.rotation.x+=d.rotSpeed.x*0.01;
    b.rotation.y+=d.rotSpeed.y*0.01;

    // Surface ripple — morph vertices over time
    const posAttr=b.geometry.attributes.position;
    if(!d.origPos)d.origPos=posAttr.array.slice();
    for(let i=0;i<posAttr.count;i++){
      const ox=d.origPos[i*3],oy=d.origPos[i*3+1],oz=d.origPos[i*3+2];
      const wave=Math.sin(ox*4+t*1.5)*Math.sin(oy*3+t*1.2)*Math.cos(oz*2+t*0.8)*0.04;
      posAttr.setXYZ(i,ox*(1+wave),oy*(1+wave),oz*(1+wave));
    }
    posAttr.needsUpdate=true;
    b.geometry.computeVertexNormals();

    // Mouse repulsion
    if(mouse.x>-5){
      const mouseWorld=new THREE.Vector3(mouse.x,mouse.y,0.5).unproject(camera);
      const dir=mouseWorld.sub(camera.position).normalize();
      const tParam=(b.position.z-camera.position.z)/dir.z;
      const mx3=camera.position.x+dir.x*tParam;
      const my3=camera.position.y+dir.y*tParam;
      const dx=b.position.x-mx3;
      const dy=b.position.y-my3;
      const dist=Math.hypot(dx,dy);
      if(dist<2.5&&dist>0){
        const force=1.2*(1-dist/2.5);
        b.position.x+=dx/dist*force;
        b.position.y+=dy/dist*force;
      }
    }
  }

  // Mouse-following light
  if(mouse.x>-5){
    pointLight.position.x=mouse.x*4;
    pointLight.position.y=mouse.y*3;
  }

  // Small bubbles rise
  for(const s of smalls){
    s.position.y+=s.userData.vy;
    s.position.x+=Math.sin(t*1.5+s.userData.phase)*0.002;
    if(s.position.y>3.5){s.position.y=-3.5;s.position.x=(Math.random()-0.5)*7}
  }

  // Subtle camera sway
  camera.position.x=Math.sin(t*0.1)*0.15;
  camera.position.y=Math.cos(t*0.08)*0.1;
  camera.lookAt(0,0,0);

  composer.render();
}

/* ======= Resize ======= */
function onResize(){
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  composer.setSize(w,h);
}
window.addEventListener('resize',onResize);
animate();
</script>
</body>
</html>
