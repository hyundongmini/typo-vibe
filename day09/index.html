<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day 09 - 비가 찬란히</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0a;display:flex;align-items:center;justify-content:center}
canvas{display:block;cursor:default}
.back-to-archive{
  position:fixed;top:16px;left:16px;z-index:9999;
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 14px 8px 12px;
  background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.6);
  font:500 12px/1 -apple-system,'Pretendard',sans-serif;
  text-decoration:none;border:1px solid rgba(255,255,255,0.08);border-radius:100px;
  backdrop-filter:blur(10px);transition:background .2s,transform .2s;
}
.back-to-archive:hover{background:rgba(255,255,255,0.15);transform:translateX(-2px)}
.back-to-archive svg{flex:none;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.day-tag{position:fixed;bottom:14px;right:18px;font:11px/1 monospace;color:rgba(255,255,255,0.12);pointer-events:none;z-index:99}
.hint{position:fixed;bottom:36px;left:0;right:0;text-align:center;font:10px/1 monospace;color:rgba(255,255,255,0.18);pointer-events:none;z-index:99;letter-spacing:2px}
</style>
</head>
<body>
<a href="../" class="back-to-archive">
  <svg viewBox="0 0 24 24" width="14" height="14"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  <span>뒤로가기</span>
</a>
<canvas id="c"></canvas>
<div class="hint">MOVE to disturb · CLICK to burst</div>
<div class="day-tag">day 09 / typo-vibe</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H;
let mx=-9999,my=-9999,mDown=false;

/* ======= Text texture (offscreen) ======= */
let textCanvas,textCtx;

function createTextTexture(){
  textCanvas=document.createElement('canvas');
  textCtx=textCanvas.getContext('2d');
  textCanvas.width=W;textCanvas.height=H;

  textCtx.fillStyle='#0a0a0a';
  textCtx.fillRect(0,0,W,H);

  const fontSize=Math.min(W*0.18,H*0.14);
  textCtx.font=`800 ${fontSize}px 'Pretendard',-apple-system,sans-serif`;
  textCtx.textAlign='center';
  textCtx.textBaseline='middle';
  textCtx.fillStyle='rgba(255,255,255,0.7)';

  const lines=['비가','찬란히'];
  const lineH=fontSize*1.3;
  const startY=H/2-lineH*0.5;
  lines.forEach((line,i)=>{
    textCtx.fillText(line,W/2,startY+i*lineH);
  });

  // 작은 부제
  textCtx.font=`300 ${Math.max(12,fontSize*0.15)}px 'Pretendard',sans-serif`;
  textCtx.fillStyle='rgba(255,255,255,0.15)';
  textCtx.fillText('typo-vibe day 09',W/2,startY+lineH*2+20);
}

/* ======= Blobs (organic water drops) ======= */
const blobs=[];
const BLOB_COUNT=14;

function initBlobs(){
  blobs.length=0;
  for(let i=0;i<BLOB_COUNT;i++){
    const r=30+Math.random()*Math.random()*120;
    blobs.push({
      x:W*0.15+Math.random()*W*0.7,
      y:H*0.1+Math.random()*H*0.8,
      r,
      ox:0,oy:0, // will be set
      vx:0,vy:0,
      // organic shape: control points for deformation
      deform:Array.from({length:8},()=>0.85+Math.random()*0.3),
      deformSpeed:Array.from({length:8},()=>0.2+Math.random()*0.5),
      deformPhase:Array.from({length:8},()=>Math.random()*Math.PI*2),
      phase:Math.random()*Math.PI*2,
      floatSpeed:0.15+Math.random()*0.3,
      // refraction
      lensStrength:1.15+Math.random()*0.25,
    });
    blobs[i].ox=blobs[i].x;
    blobs[i].oy=blobs[i].y;
  }
  // Sort by size (small in front for depth)
  blobs.sort((a,b)=>b.r-a.r);
}

/* ======= Draw organic blob shape path ======= */
function blobPath(b,t,scale){
  const s=scale||1;
  const pts=b.deform.length;
  const angleStep=Math.PI*2/pts;
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const idx=i%pts;
    const angle=idx*angleStep;
    const d=b.deform[idx]+Math.sin(t*b.deformSpeed[idx]+b.deformPhase[idx])*0.08;
    const rr=b.r*d*s;
    const px=b.x+Math.cos(angle)*rr;
    const py=b.y+Math.sin(angle)*rr;
    if(i===0)ctx.moveTo(px,py);
    else{
      // smooth with quadratic curve
      const prevIdx=(i-1)%pts;
      const prevAngle=prevIdx*angleStep;
      const prevD=b.deform[prevIdx]+Math.sin(t*b.deformSpeed[prevIdx]+b.deformPhase[prevIdx])*0.08;
      const prevR=b.r*prevD*s;
      const cpx=b.x+Math.cos((prevAngle+angle)/2)*(prevR+rr)/2*1.02;
      const cpy=b.y+Math.sin((prevAngle+angle)/2)*(prevR+rr)/2*1.02;
      ctx.quadraticCurveTo(cpx,cpy,px,py);
    }
  }
  ctx.closePath();
}

/* ======= Draw a single water blob ======= */
function drawBlob(b,t){
  ctx.save();

  // 1. Clip to blob shape
  blobPath(b,t);
  ctx.save();
  ctx.clip();

  // 2. Draw refracted text inside (magnified + shifted)
  const lens=b.lensStrength;
  const srcX=b.x-b.r*lens;
  const srcY=b.y-b.r*lens;
  const srcW=b.r*2*lens;
  const srcH=b.r*2*lens;
  const dstX=b.x-b.r;
  const dstY=b.y-b.r;
  const dstW=b.r*2;
  const dstH=b.r*2;

  // Slight chromatic aberration
  ctx.globalAlpha=0.85;
  try{
    ctx.drawImage(textCanvas,
      Math.max(0,srcX-3),Math.max(0,srcY),Math.min(srcW,W),Math.min(srcH,H),
      dstX,dstY,dstW,dstH);
  }catch(e){}

  // 3. Glass fill (dark tinted)
  ctx.globalAlpha=0.15;
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(dstX,dstY,dstW,dstH);

  ctx.restore(); // unclip

  // 4. Edge highlight (rim light)
  blobPath(b,t);
  ctx.strokeStyle='rgba(255,255,255,0.25)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // 5. Inner edge glow
  blobPath(b,t);
  const edgeGrad=ctx.createRadialGradient(b.x,b.y,b.r*0.7,b.x,b.y,b.r);
  edgeGrad.addColorStop(0,'rgba(255,255,255,0)');
  edgeGrad.addColorStop(0.85,'rgba(255,255,255,0)');
  edgeGrad.addColorStop(1,'rgba(255,255,255,0.08)');
  ctx.fillStyle=edgeGrad;
  ctx.fill();

  // 6. Top-left highlight (specular)
  const hlX=b.x-b.r*0.35;
  const hlY=b.y-b.r*0.35;
  const hlR=b.r*0.4;
  const hlGrad=ctx.createRadialGradient(hlX,hlY,0,hlX,hlY,hlR);
  hlGrad.addColorStop(0,'rgba(255,255,255,0.55)');
  hlGrad.addColorStop(0.4,'rgba(255,255,255,0.15)');
  hlGrad.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath();
  ctx.arc(hlX,hlY,hlR,0,Math.PI*2);
  ctx.fillStyle=hlGrad;
  ctx.fill();

  // 7. Small secondary highlight (bottom-right)
  if(b.r>40){
    const hl2X=b.x+b.r*0.25;
    const hl2Y=b.y+b.r*0.3;
    const hl2R=b.r*0.15;
    const hl2Grad=ctx.createRadialGradient(hl2X,hl2Y,0,hl2X,hl2Y,hl2R);
    hl2Grad.addColorStop(0,'rgba(255,255,255,0.3)');
    hl2Grad.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath();
    ctx.arc(hl2X,hl2Y,hl2R,0,Math.PI*2);
    ctx.fillStyle=hl2Grad;
    ctx.fill();
  }

  // 8. Shadow on background
  ctx.beginPath();
  ctx.ellipse(b.x+b.r*0.15,b.y+b.r*1.05,b.r*0.7,b.r*0.1,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.fill();

  ctx.restore();
}

/* ======= Small floating bubbles ======= */
const smallBubbles=[];
function initSmallBubbles(){
  smallBubbles.length=0;
  for(let i=0;i<30;i++){
    smallBubbles.push({
      x:Math.random()*W,
      y:Math.random()*H,
      r:2+Math.random()*8,
      vy:-0.2-Math.random()*0.5,
      vx:(Math.random()-0.5)*0.3,
      phase:Math.random()*Math.PI*2,
    });
  }
}

function drawSmallBubble(sb){
  const grad=ctx.createRadialGradient(sb.x-sb.r*0.3,sb.y-sb.r*0.3,0,sb.x,sb.y,sb.r);
  grad.addColorStop(0,'rgba(255,255,255,0.15)');
  grad.addColorStop(0.7,'rgba(255,255,255,0.05)');
  grad.addColorStop(1,'rgba(255,255,255,0.02)');
  ctx.beginPath();
  ctx.arc(sb.x,sb.y,sb.r,0,Math.PI*2);
  ctx.fillStyle=grad;
  ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.12)';
  ctx.lineWidth=0.5;
  ctx.stroke();
}

/* ======= Physics ======= */
function update(t){
  // Blobs: float + mouse interaction
  for(const b of blobs){
    // Gentle floating
    b.x=b.ox+Math.sin(t*b.floatSpeed+b.phase)*8;
    b.y=b.oy+Math.cos(t*b.floatSpeed*0.7+b.phase)*6;

    // Mouse repulsion
    const dx=b.x-mx;
    const dy=b.y-my;
    const dist=Math.hypot(dx,dy);
    const repelR=mDown?200:120;
    if(dist<repelR&&dist>0){
      const force=(mDown?15:4)*(1-dist/repelR);
      b.x+=dx/dist*force;
      b.y+=dy/dist*force;
    }
  }

  // Small bubbles: rise
  for(const sb of smallBubbles){
    sb.y+=sb.vy;
    sb.x+=sb.vx+Math.sin(t*2+sb.phase)*0.3;
    if(sb.y<-sb.r*2){sb.y=H+sb.r;sb.x=Math.random()*W}
  }
}

/* ======= Burst on click ======= */
let burstParticles=[];
function burstAt(px,py){
  for(let i=0;i<20;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*6;
    burstParticles.push({
      x:px,y:py,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      r:2+Math.random()*5,
      life:400+Math.random()*300,
      born:Date.now(),
    });
  }
  // Push blobs away
  for(const b of blobs){
    const dx=b.ox-px;
    const dy=b.oy-py;
    const dist=Math.hypot(dx,dy);
    if(dist<250&&dist>0){
      const push=40*(1-dist/250);
      b.ox+=dx/dist*push;
      b.oy+=dy/dist*push;
      // Spring back slowly
      const origX=W*0.15+Math.random()*W*0.7;
      const origY=H*0.1+Math.random()*H*0.8;
      setTimeout(()=>{
        b.ox+=(origX-b.ox)*0.3;
        b.oy+=(origY-b.oy)*0.3;
      },800);
    }
  }
}

function drawBurstParticles(){
  const now=Date.now();
  burstParticles=burstParticles.filter(p=>(now-p.born)<p.life);
  for(const p of burstParticles){
    const age=(now-p.born)/p.life;
    p.x+=p.vx*(1-age);
    p.y+=p.vy*(1-age);
    const alpha=(1-age)*0.4;
    const r=p.r*(1-age*0.5);
    ctx.beginPath();
    ctx.arc(p.x,p.y,r,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,210,230,${alpha})`;
    ctx.fill();
  }
}

/* ======= Render ======= */
function render(){
  ctx.clearRect(0,0,W,H);
  const t=Date.now()*0.001;

  update(t);

  // Draw background text (faint)
  ctx.globalAlpha=0.4;
  ctx.drawImage(textCanvas,0,0);
  ctx.globalAlpha=1;

  // Draw blobs (back to front = big to small)
  for(const b of blobs){
    drawBlob(b,t);
  }

  // Small floating bubbles
  for(const sb of smallBubbles){
    drawSmallBubble(sb);
  }

  // Burst particles
  drawBurstParticles();

  requestAnimationFrame(render);
}

/* ======= Init ======= */
function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  createTextTexture();
  initBlobs();
  initSmallBubbles();
}

window.addEventListener('resize',resize);
canvas.addEventListener('mousemove',(e)=>{mx=e.clientX;my=e.clientY});
canvas.addEventListener('mouseleave',()=>{mx=-9999;my=-9999});
canvas.addEventListener('mousedown',(e)=>{mDown=true;burstAt(e.clientX,e.clientY)});
window.addEventListener('mouseup',()=>{mDown=false});
canvas.addEventListener('touchstart',(e)=>{
  e.preventDefault();const t=e.touches[0];
  mx=t.clientX;my=t.clientY;mDown=true;burstAt(t.clientX,t.clientY);
},{passive:false});
canvas.addEventListener('touchmove',(e)=>{const t=e.touches[0];mx=t.clientX;my=t.clientY},{passive:true});
canvas.addEventListener('touchend',()=>{mx=-9999;my=-9999;mDown=false});

resize();
render();
</script>
</body>
</html>
