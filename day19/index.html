<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Day 19 — 도치학 그리기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none}
body{background:#fff;font-family:'Pretendard',sans-serif;display:flex;flex-direction:column;
  align-items:center;position:relative}

/* Top bar */
.topbar{width:100%;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar .back{color:rgba(0,0,0,.3);font-size:13px;text-decoration:none;
  border:1px solid rgba(0,0,0,.06);border-radius:100px;padding:6px 12px}
.topbar .back:hover{color:rgba(0,0,0,.6)}
.topbar .mode-toggle{display:flex;gap:6px}
.topbar .mode-toggle button{padding:7px 16px;border-radius:100px;border:1.5px solid rgba(0,0,0,.08);
  background:#fff;font:600 12px/1 'Pretendard',sans-serif;cursor:pointer;transition:all .2s;color:#999}
.topbar .mode-toggle button.active{border-color:#111;background:#111;color:#fff}

/* Canvas area — takes up most space */
.canvas-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;position:relative;padding:0 20px;gap:12px}
.title-area{text-align:center}
.title-area h1{font-size:22px;font-weight:800;color:#111;letter-spacing:-0.3px}
.title-area .sub{font-size:13px;color:rgba(0,0,0,.3);margin-top:6px}
.char-select{display:flex;gap:10px}
.char-select button{padding:10px 24px;border-radius:100px;border:2px solid rgba(0,0,0,.06);
  background:#fff;font:700 13px/1 'Pretendard',sans-serif;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:6px}
.char-select button.active{border-color:#111;background:#111;color:#fff}
.char-select button:hover:not(.active){border-color:rgba(0,0,0,.15)}
.diff{font-size:10px;opacity:.4;font-weight:400}
.hard-ref{display:none}
.hard-ref img{width:100px;height:100px;object-fit:contain;border-radius:12px;
  background:#f8f8f8;padding:10px;border:1.5px solid rgba(0,0,0,.05)}
canvas{border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.04);cursor:crosshair;
  touch-action:none;width:min(88vw,400px);height:min(88vw,400px);background:#fafafa;
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),box-shadow .4s}
canvas.celebrate{transform:scale(1.03);box-shadow:0 8px 40px rgba(78,205,196,.35),0 0 60px rgba(78,205,196,.15)}
canvas.fail-shake{animation:failShake .5s ease-in-out}
@keyframes failShake{0%,100%{transform:translateX(0) rotate(0)}20%{transform:translateX(-6px) rotate(-.5deg)}40%{transform:translateX(6px) rotate(.5deg)}60%{transform:translateX(-4px) rotate(-.3deg)}80%{transform:translateX(4px) rotate(.3deg)}}

/* Bottom section */
.actions{display:flex;gap:10px;width:100%;max-width:320px}
.actions button{flex:1;padding:14px 0;border-radius:14px;border:none;font:700 14px/1 'Pretendard',sans-serif;cursor:pointer}
.btn-clear{background:#f2f2f2;color:#111}
.btn-clear:hover{background:#e8e8e8}
.btn-score{background:#111;color:#fff}
.btn-score:hover{background:#333}

/* Result overlay */
.result{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:#fff;z-index:100;
  opacity:0;pointer-events:none;transition:opacity .4s;padding:40px 20px}
.result.show{opacity:1;pointer-events:auto}
.result .label{font-size:15px;font-weight:500;color:rgba(0,0,0,.35)}
.result .score{font-size:clamp(60px,18vw,100px);font-weight:900;color:#4ECDC4;margin:8px 0 0}
.result .result-img{max-width:min(220px,55vw);max-height:30vh;object-fit:contain;margin:28px 0;border-radius:16px;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
.result .msg{font-size:15px;color:rgba(0,0,0,.45);text-align:center;line-height:1.6;max-width:280px}
.result .btn-retry{margin-top:28px;padding:16px 40px;border-radius:14px;border:none;background:#111;color:#fff;
  font:700 15px/1 'Pretendard',sans-serif;cursor:pointer;width:100%;max-width:280px}
.result .btn-retry:hover{background:#333}

.tag{position:fixed;bottom:8px;right:12px;font:10px/1 monospace;color:rgba(0,0,0,.06);z-index:10}

@keyframes cfall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;z-index:101;overflow:hidden}

/* Mascot coach */
.mascot-area{position:fixed;z-index:50;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:0;
  transition:left 4s linear,top 1s ease-in-out}
.mascot-bubble{background:#111;color:#fff;font:600 12px/1.4 'Pretendard',sans-serif;
  padding:8px 12px;border-radius:14px 14px 4px 14px;max-width:140px;text-align:center;
  opacity:0;transform:translateY(6px) scale(.9);transition:all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;white-space:pre-line}
.mascot-bubble.show{opacity:1;transform:translateY(0) scale(1)}
.mascot-sprite{width:52px;height:52px;margin-top:4px;
  animation:mascotWalk 0.6s steps(2) infinite}
@keyframes mascotWalk{0%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-3px) rotate(2deg)}100%{transform:translateY(0) rotate(-2deg)}}
.mascot-sprite.happy{animation:mascotHappy .4s ease}
@keyframes mascotHappy{0%,100%{transform:rotate(0) scale(1)}25%{transform:rotate(-8deg) scale(1.1)}75%{transform:rotate(8deg) scale(1.1)}}
.mascot-sprite.sad{animation:mascotSad .5s ease}
@keyframes mascotSad{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
</style>
</head>
<body>

<div class="topbar">
  <a href="../" class="back">← 뒤로</a>
  <div class="mode-toggle">
    <button id="btnEasy" class="active" onclick="selectMode('easy')">따라 그리기</button>
    <button id="btnHard" onclick="selectMode('hard')">안보고 그리기</button>
  </div>
</div>

<div class="canvas-wrap">
  <div class="title-area">
    <h1>도치학 그리기</h1>
    <div class="sub">캐릭터를 따라 그려보세요!</div>
  </div>
  <div class="char-select">
    <button id="btnDochi" class="active" onclick="selectChar('dochi')">도치 <span class="diff">★</span></button>
    <button id="btnHak" onclick="selectChar('hak')">학 <span class="diff">★★★</span></button>
  </div>
  <div class="hard-ref" id="hardRef">
    <img id="hardRefImg" src="도치1.svg" alt="참고 이미지">
  </div>
  <canvas id="c" width="400" height="400"></canvas>
  <div class="actions">
    <button class="btn-clear" onclick="clearCanvas()">지우기</button>
    <button class="btn-score" onclick="submitScore()">채점하기</button>
  </div>
</div>

<div class="result" id="result">
  <div class="label">당신의 <span id="charLabel">도치</span>는</div>
  <div class="score" id="scoreText">0점</div>
  <img id="resultImg" class="result-img" src="" alt="result" style="display:none">
  <div class="msg" id="msgText"></div>
  <button class="btn-retry" onclick="retry()">다시 그리기</button>
</div>

<div class="tag">day 19 / typo-vibe</div>

<!-- Mascot coach -->
<div class="mascot-area" id="mascotArea">
  <div class="mascot-bubble" id="mascotBubble"></div>
  <img class="mascot-sprite" id="mascotSprite" src="도치1.svg" alt="도치">
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

let currentChar = 'dochi';
let currentMode = 'easy';
let drawing = false;
let userPoints = [];
let guideImg = null;

function loadGuide(char) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.src = char === 'dochi' ? '도치1.svg' : '학1.svg';
  });
}

async function renderGuide() {
  const img = await loadGuide(currentChar);
  guideImg = document.createElement('canvas');
  guideImg.width = W; guideImg.height = H;
  const gc = guideImg.getContext('2d');
  const pad = currentChar === 'dochi' ? 80 : 30;
  const scale = Math.min((W-pad*2)/img.naturalWidth, (H-pad*2)/img.naturalHeight);
  const iw = img.naturalWidth * scale;
  const ih = img.naturalHeight * scale;
  const ox = (W - iw) / 2;
  const oy = (H - ih) / 2;
  gc.drawImage(img, ox, oy, iw, ih);
  render();
}

function render() {
  ctx.clearRect(0, 0, W, H);
  if (guideImg && currentMode === 'easy') {
    ctx.globalAlpha = 0.12;
    ctx.drawImage(guideImg, 0, 0);
    ctx.globalAlpha = 1;
  }
  if (userPoints.length > 0) {
    ctx.fillStyle = '#000';
    const brushSize = 8;
    for (let i = 0; i < userPoints.length; i++) {
      const p = userPoints[i];
      if (p.break) {
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.fillRect(-brushSize/2, -brushSize/2, brushSize, brushSize);
        ctx.restore(); continue;
      }
      const prev = userPoints[i-1];
      if (!prev || prev.break) {
        ctx.save(); ctx.translate(p.x, p.y);
        ctx.fillRect(-brushSize/2, -brushSize/2, brushSize, brushSize);
        ctx.restore(); continue;
      }
      const dx = p.x - prev.x, dy = p.y - prev.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      const steps = Math.max(1, Math.ceil(dist / (brushSize * 0.4)));
      const angle = Math.atan2(dy, dx) * 0.3;
      for (let s = 0; s <= steps; s++) {
        const t = s / steps;
        ctx.save();
        ctx.translate(prev.x + dx*t, prev.y + dy*t);
        ctx.rotate(angle);
        ctx.fillRect(-brushSize/2, -brushSize/2, brushSize, brushSize);
        ctx.restore();
      }
    }
  }
  updateParticles(); drawParticles();
  if (drawing || particles.length > 0) requestAnimationFrame(render);
}

// ── Scoring ──
function calculateScore() {
  if (!guideImg || userPoints.length < 10) return 0;

  // Render user drawing to offscreen canvas
  const userCanvas = document.createElement('canvas');
  userCanvas.width = W; userCanvas.height = H;
  const uc = userCanvas.getContext('2d');
  uc.fillStyle = '#000';
  const brushSize = 10;
  for (let i = 0; i < userPoints.length; i++) {
    const p = userPoints[i];
    uc.fillRect(p.x - brushSize/2, p.y - brushSize/2, brushSize, brushSize);
  }

  const guideData = guideImg.getContext('2d').getImageData(0, 0, W, H).data;
  const userData = uc.getImageData(0, 0, W, H).data;

  let guidePixels = 0, coveredPixels = 0, userPixels = 0, overflowPixels = 0;
  const tolerance = 4; // very strict

  for (let y = 0; y < H; y += 2) {
    for (let x = 0; x < W; x += 2) {
      const idx = (y * W + x) * 4;
      const gAlpha = guideData[idx + 3], uAlpha = userData[idx + 3];

      if (gAlpha > 128) guidePixels++;
      if (uAlpha > 128) userPixels++;

      // Coverage: user drew on or very near guide
      if (gAlpha > 128) {
        if (uAlpha > 128) { coveredPixels++; }
        else {
          let found = false;
          for (let dy = -tolerance; dy <= tolerance && !found; dy += 2)
            for (let dx = -tolerance; dx <= tolerance && !found; dx += 2) {
              const nx = x+dx, ny = y+dy;
              if (nx<0||nx>=W||ny<0||ny>=H) continue;
              if (userData[(ny*W+nx)*4+3] > 128) { found=true; coveredPixels++; }
            }
        }
      }

      // Overflow: user drew far from guide
      if (uAlpha > 128 && gAlpha <= 128) {
        let nearGuide = false;
        for (let dy = -tolerance; dy <= tolerance && !nearGuide; dy += 2)
          for (let dx = -tolerance; dx <= tolerance && !nearGuide; dx += 2) {
            const nx = x+dx, ny = y+dy;
            if (nx<0||nx>=W||ny<0||ny>=H) continue;
            if (guideData[(ny*W+nx)*4+3] > 128) nearGuide=true;
          }
        if (!nearGuide) overflowPixels++;
      }
    }
  }

  if (guidePixels === 0) return 0;

  // 1. Coverage: how much of the guide was actually traced (strict)
  const coverage = coveredPixels / guidePixels;

  // 2. Precision: heavily penalize drawing outside the guide
  // overflowPixels / total user pixels = how much is "wasted"
  const overflowRatio = userPixels > 0 ? overflowPixels / userPixels : 0;
  const precision = Math.max(0, 1 - overflowRatio * 3); // 33% overflow = 0 precision

  // 3. Size ratio penalty: if user drew way more than guide, penalize
  // Ideal: userPixels ≈ guidePixels. Drawing 3x more = penalty
  const sizeRatio = userPixels / guidePixels;
  const sizePenalty = sizeRatio > 1.5 ? Math.max(0, 1 - (sizeRatio - 1.5) * 0.5) : 1;

  // Combined score
  const raw = coverage * 0.45 + precision * 0.35 + sizePenalty * 0.2;

  // Apply steep curve: makes 80+ very hard to achieve
  const curved = Math.pow(raw, 1.8) * 100;

  // Mode bonus: hard mode is harder so give slight bonus
  const modeMultiplier = currentMode === 'hard' ? 1.15 : 1.0;

  return Math.min(99, Math.max(0, curved * modeMultiplier));
}

function getMessage(score) {
  const pick = arr => arr[Math.floor(Math.random() * arr.length)];
  if (score >= 90) return pick(['완벽하고슴! 프로 일러스트레이터 아니냐오 🎨','천재고슴...! 도치가 감동했고슴 🥹','이건 진짜 대단하오! 혹시 미대냐오? 🏆','할 말을 잃었고슴... 너무 잘 그렸오 ✨']);
  if (score >= 80) return pick(['잘했고슴! 재능이 보이오 ✨','오... 꽤 하오! 인정하겠고슴 👏','이 정도면 합격이오! 도치가 기뻐하고슴 🎉','실력이 있었고슴! 놀랐오 💚']);
  if (score >= 70) return pick(['조금만 더 노력했으면 좋겠오 💪','아쉽고슴... 거의 다 왔오! 😤','나쁘진 않은데 좀 더 정확하면 좋겠오 🫠','70점대라니... 분하지 않고슴? 다시 해보오! 🔥']);
  if (score >= 50) return pick(['음... 좀 더 따라 그려보오 😅','가이드가 보이오? 잘 보고 그리오! 👀','노력은 인정하오... 하지만 부족하오 💦']);
  return pick(['이건 뭐오...? 다시 하오! 🫠','독창적이긴 한데... 따라 그리는 거오 😂','도치가 슬퍼하고 있고슴... 😢']);
}

// ── Controls ──
function selectChar(char) {
  currentChar = char;
  document.getElementById('btnDochi').classList.toggle('active', char === 'dochi');
  document.getElementById('btnHak').classList.toggle('active', char === 'hak');
  updateHardRef(); clearCanvas(); renderGuide();
}
function selectMode(mode) {
  currentMode = mode;
  document.getElementById('btnEasy').classList.toggle('active', mode === 'easy');
  document.getElementById('btnHard').classList.toggle('active', mode === 'hard');
  document.getElementById('hardRef').style.display = mode === 'hard' ? 'block' : 'none';
  updateHardRef(); clearCanvas(); renderGuide();
}
function updateHardRef() {
  document.getElementById('hardRefImg').src = currentChar === 'dochi' ? '도치1.svg' : '학1.svg';
}
function clearCanvas() {
  userPoints = []; recentAccuracy = [];
  mascotBubble.classList.remove('show'); render();
}
function submitScore() {
  const score = calculateScore();
  const rounded = Math.round(score * 10) / 10;
  document.getElementById('charLabel').textContent = currentChar === 'dochi' ? '도치' : '학';
  document.getElementById('scoreText').textContent = rounded + '점';
  document.getElementById('msgText').textContent = getMessage(rounded);
  const resultImg = document.getElementById('resultImg');
  const WIN_THRESHOLD = 80;
  if (rounded >= WIN_THRESHOLD) {
    resultImg.src = 'win.png'; resultImg.style.display = 'block';
    document.getElementById('scoreText').style.color = '#4ECDC4';
  } else {
    resultImg.src = ['lose.png','lose2.png'][Math.floor(Math.random()*2)];
    resultImg.style.display = 'block';
    document.getElementById('scoreText').style.color = '#E63946';
  }
  if (rounded >= WIN_THRESHOLD) {
    canvas.classList.add('celebrate');
    setTimeout(() => canvas.classList.remove('celebrate'), 1200);
  } else {
    canvas.classList.add('fail-shake');
    setTimeout(() => canvas.classList.remove('fail-shake'), 600);
  }
  setTimeout(() => {
    document.getElementById('result').classList.add('show');
    if (rounded >= WIN_THRESHOLD) spawnConfetti();
  }, 500);
}
function retry() {
  document.getElementById('result').classList.remove('show');
  document.getElementById('resultImg').style.display = 'none';
  clearCanvas();
}

// ── Confetti ──
function spawnConfetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap'; document.body.appendChild(wrap);
  const colors = ['#E63946','#4ECDC4','#FFE66D','#95E1D3','#F38181','#AA96DA'];
  for (let i = 0; i < 50; i++) {
    const c = document.createElement('div');
    const size = 6 + Math.random() * 8;
    c.style.cssText = `position:absolute;left:${10+Math.random()*80}%;top:-20px;width:${size}px;height:${size*0.5}px;background:${colors[i%colors.length]};border-radius:${Math.random()>.5?'50%':'2px'};animation:cfall ${1.5+Math.random()*1.5}s ${Math.random()*0.5}s ease-in forwards`;
    wrap.appendChild(c);
  }
  setTimeout(() => wrap.remove(), 4000);
}

// ── Particles ──
let particles = [];
function spawnParticle(x, y) {
  particles.push({x, y, vx:(Math.random()-.5)*3, vy:(Math.random()-.5)*3, life:1,
    size:2+Math.random()*3, color:['#E63946','#FF6B6B','#FFE66D','#4ECDC4'][Math.floor(Math.random()*4)]});
}
function updateParticles() {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }
}
function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life * 0.7; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── Input ──
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const touch = e.touches ? e.touches[0] : e;
  return { x: (touch.clientX - rect.left) * scaleX, y: (touch.clientY - rect.top) * scaleY };
}

// ── Mascot Coach ──
const mascotArea = document.getElementById('mascotArea');
const mascotBubble = document.getElementById('mascotBubble');
const mascotSprite = document.getElementById('mascotSprite');
let lastCoachTime = 0, coachCooldown = 2000, recentAccuracy = [];

let mascotX = window.innerWidth - 100, mascotY = window.innerHeight - 100;
function getRandomMascotPos() {
  const margin = 30, spriteW = 70;
  const bottomY = window.innerHeight - 100;
  const x = margin + Math.random() * (window.innerWidth - margin*2 - spriteW);
  return { x, y: bottomY };
}
function moveMascot() {
  const pos = getRandomMascotPos();
  const oldX = mascotX;
  mascotX = pos.x; mascotY = pos.y;
  if (pos.x < oldX) mascotSprite.style.transform = 'scaleX(-1)';
  else if (pos.x > oldX) mascotSprite.style.transform = 'scaleX(1)';
  mascotArea.style.left = pos.x + 'px';
  mascotArea.style.top = pos.y + 'px';
}
mascotArea.style.left = mascotX + 'px';
mascotArea.style.top = mascotY + 'px';
moveMascot();
setInterval(moveMascot, 6000 + Math.random() * 3000);

const goodComments = ['오 잘하고 있고슴!','바로 그거오! 👍','선이 정확하오!','이대로 계속 가오!','재능이 보이고슴 ✨','좋오 좋오~','감탄했고슴!','프로냐오...?'];
const badComments = ['힘내라고슴!','선이 벗어났오!','가이드를 보오! 👀','좀 더 안쪽으로오~','삐뚤어졌고슴...','집중하오!','아이고슴...','거기 아니오!'];
const startComments = ['시작이오! 화이팅고슴 💪','잘 그려보오~','도치가 지켜보고 있고슴 👀'];
const idleComments = ['왜 멈췄오...?','계속 그리오!','잠든 거 아니고슴?'];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function showCoachComment(text, mood) {
  mascotBubble.textContent = text;
  mascotBubble.classList.add('show');
  mascotSprite.classList.remove('happy','sad');
  if (mood === 'good') { void mascotSprite.offsetWidth; mascotSprite.classList.add('happy'); }
  else if (mood === 'bad') { void mascotSprite.offsetWidth; mascotSprite.classList.add('sad'); }
  clearTimeout(mascotBubble._hideTimer);
  mascotBubble._hideTimer = setTimeout(() => mascotBubble.classList.remove('show'), 2500);
}
function checkAccuracyAtPoint(px, py) {
  if (!guideImg) return null;
  const gData = guideImg.getContext('2d').getImageData(0, 0, W, H).data;
  for (let dy = -10; dy <= 10; dy += 3)
    for (let dx = -10; dx <= 10; dx += 3) {
      const nx = Math.round(px+dx), ny = Math.round(py+dy);
      if (nx<0||nx>=W||ny<0||ny>=H) continue;
      if (gData[(ny*W+nx)*4+3] > 80) return true;
    }
  return false;
}
function coachDuringDraw(p) {
  const now = Date.now();
  if (userPoints.length === 1) { showCoachComment(pick(startComments),'good'); lastCoachTime=now; return; }
  if (now - lastCoachTime < coachCooldown) return;
  const onGuide = checkAccuracyAtPoint(p.x, p.y);
  if (onGuide === null) return;
  recentAccuracy.push(onGuide);
  if (recentAccuracy.length > 15) recentAccuracy.shift();
  if (recentAccuracy.length < 8) return;
  const goodRatio = recentAccuracy.filter(v=>v).length / recentAccuracy.length;
  if (goodRatio >= 0.7) showCoachComment(pick(goodComments),'good');
  else if (goodRatio <= 0.3) showCoachComment(pick(badComments),'bad');
  lastCoachTime = now; recentAccuracy = [];
}
let idleTimer = null;
function resetIdleTimer() {
  clearTimeout(idleTimer);
  idleTimer = setTimeout(() => {
    if (userPoints.length > 5 && !document.getElementById('result').classList.contains('show'))
      showCoachComment(pick(idleComments),'bad');
  }, 5000);
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault(); drawing = true;
  const p = getPos(e); p.break = true; userPoints.push(p);
  coachDuringDraw(p); resetIdleTimer(); render();
});
canvas.addEventListener('pointermove', e => {
  if (!drawing) return; e.preventDefault();
  const p = getPos(e); userPoints.push(p);
  if (Math.random() > 0.5) spawnParticle(p.x, p.y);
  coachDuringDraw(p); resetIdleTimer(); render();
});
canvas.addEventListener('pointerup', () => { drawing = false; });
canvas.addEventListener('pointerleave', () => { drawing = false; });

renderGuide();
</script>
</body>
</html>
